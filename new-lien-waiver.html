<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; New Lien Waiver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#090E1A; --bg2:#111827; --bg3:#1A2438; --amber:#F59E0B; --amber2:#FCD34D; --white:#F8FAFC; --muted:#94A3B8; --dim:#475569; --border:rgba(255,255,255,0.07); --red:#EF4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
    .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; color: var(--dim); cursor: pointer; font-family: inherit; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .btn-back:hover { color: var(--white); border-color: var(--amber); }
    .main { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .form-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .form-section-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    input, select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.88rem; color: var(--white); font-family: inherit; outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--amber); }
    select option { background: var(--bg2); }
    textarea { resize: vertical; min-height: 80px; }
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .type-card { border: 1px solid var(--border); border-radius: 10px; padding: 1rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .type-card:hover { border-color: rgba(245,158,11,0.4); }
    .type-card.selected { border-color: var(--amber); background: rgba(245,158,11,0.06); }
    .type-card input[type=radio] { display: none; }
    .type-name { font-size: 0.82rem; font-weight: 700; margin-bottom: 0.25rem; }
    .type-desc { font-size: 0.72rem; color: var(--muted); line-height: 1.5; }
    .btn-submit { background: var(--amber); color: #090E1A; border: none; border-radius: 10px; padding: 0.9rem 2rem; font-size: 0.95rem; font-weight: 800; cursor: pointer; font-family: inherit; width: 100%; margin-top: 1.5rem; transition: background 0.15s; }
    .btn-submit:hover { background: var(--amber2); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--red); margin-top: 1rem; display: none; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } .type-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <a href="/dashboard.html" class="btn-back">&larr; Dashboard</a>
  </nav>
  <main class="main">
    <div class="page-title">New Lien Waiver</div>
    <div class="page-sub">Generate a legally correct lien waiver for any payment milestone.</div>

    <div class="form-section">
      <div class="form-section-title">Waiver Type</div>
      <div class="type-grid">
        <label class="type-card selected" onclick="selectType('conditional_progress')">
          <input type="radio" name="waiver_type" value="conditional_progress" checked>
          <div class="type-name">Conditional Progress</div>
          <div class="type-desc">For a progress payment. Takes effect only when the check clears. Most common.</div>
        </label>
        <label class="type-card" onclick="selectType('unconditional_progress')">
          <input type="radio" name="waiver_type" value="unconditional_progress">
          <div class="type-name">Unconditional Progress</div>
          <div class="type-desc">Effective immediately. Use only after you&rsquo;ve confirmed the payment cleared.</div>
        </label>
        <label class="type-card" onclick="selectType('conditional_final')">
          <input type="radio" name="waiver_type" value="conditional_final">
          <div class="type-name">Conditional Final</div>
          <div class="type-desc">For the final payment. Waives all claims conditional on final check clearing.</div>
        </label>
        <label class="type-card" onclick="selectType('unconditional_final')">
          <input type="radio" name="waiver_type" value="unconditional_final">
          <div class="type-name">Unconditional Final</div>
          <div class="type-desc">Complete release of all lien rights. Use only after final payment confirmed received.</div>
        </label>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Parties</div>
      <div class="form-grid">
        <div class="form-group"><label>Claimant Name (you)</label><input type="text" id="claimant_name" placeholder="Your name (auto-fills from profile)"></div>
        <div class="form-group"><label>Claimant Company</label><input type="text" id="claimant_company" placeholder="Your business name"></div>
        <div class="form-group"><label>Customer / Owner Name *</label><input type="text" id="customer_name" placeholder="Property owner or GC name"></div>
        <div class="form-group"><label>Customer Company</label><input type="text" id="customer_company" placeholder="Owner or GC company"></div>
        <div class="form-group"><label>Property Owner (if different)</label><input type="text" id="property_owner" placeholder="Name on property title"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Property &amp; Payment</div>
      <div class="form-grid">
        <div class="form-group full"><label>Job / Property Address *</label><input type="text" id="job_address" placeholder="123 Main St"></div>
        <div class="form-group"><label>City</label><input type="text" id="job_city" placeholder="Atlanta"></div>
        <div class="form-group"><label>State</label><input type="text" id="job_state" placeholder="GA" maxlength="2"></div>
        <div class="form-group"><label>ZIP</label><input type="text" id="job_zip" placeholder="30301"></div>
        <div class="form-group"><label>Amount of This Waiver ($) *</label><input type="number" id="amount" placeholder="0.00" min="0" step="0.01"></div>
        <div class="form-group"><label>Through Date (work covered through)</label><input type="date" id="through_date"></div>
        <div class="form-group"><label>Payment Date</label><input type="date" id="payment_date"></div>
        <div class="form-group"><label>Check / Reference Number</label><input type="text" id="check_number" placeholder="Check #12345"></div>
        <div class="form-group full"><label>Notes (optional)</label><textarea id="notes" placeholder="Any special conditions or exceptions..."></textarea></div>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button class="btn-submit" id="submit-btn" onclick="createWaiver()">&#9733; Generate Lien Waiver</button>
  </main>

  <script>
    var SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'bo-auth' } });

    var selectedType = 'conditional_progress';

    db.auth.getSession().then(function(res) {
      if (!res.data.session) { window.location.href = '/login.html'; return; }
      db.from('contractor_profiles').select('contractor_name, business_name').single().then(function(pRes) {
        if (pRes.data) {
          document.getElementById('claimant_name').value = pRes.data.contractor_name || '';
          document.getElementById('claimant_company').value = pRes.data.business_name || pRes.data.contractor_name || '';
        }
      });
    });

    function selectType(type) {
      selectedType = type;
      var cards = document.querySelectorAll('.type-card');
      for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
      var radios = document.querySelectorAll('input[name=waiver_type]');
      for (var i = 0; i < radios.length; i++) {
        if (radios[i].value === type) { radios[i].checked = true; radios[i].closest('.type-card').classList.add('selected'); }
      }
    }

    function showError(msg) { var el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }

    function createWaiver() {
      var customer = document.getElementById('customer_name').value.trim();
      var addr     = document.getElementById('job_address').value.trim();
      var amount   = parseFloat(document.getElementById('amount').value);
      if (!customer) { showError('Customer / owner name is required.'); return; }
      if (!addr)     { showError('Property address is required.'); return; }
      if (isNaN(amount) || amount <= 0) { showError('A valid waiver amount is required.'); return; }

      var data = {
        waiver_type:      selectedType,
        claimant_name:    document.getElementById('claimant_name').value.trim() || null,
        claimant_company: document.getElementById('claimant_company').value.trim() || null,
        customer_name:    customer,
        customer_company: document.getElementById('customer_company').value.trim() || null,
        property_owner:   document.getElementById('property_owner').value.trim() || null,
        job_address:      addr,
        job_city:         document.getElementById('job_city').value.trim() || null,
        job_state:        document.getElementById('job_state').value.trim().toUpperCase() || null,
        job_zip:          document.getElementById('job_zip').value.trim() || null,
        amount:           amount,
        through_date:     document.getElementById('through_date').value || null,
        payment_date:     document.getElementById('payment_date').value || null,
        check_number:     document.getElementById('check_number').value.trim() || null,
        notes:            document.getElementById('notes').value.trim() || null,
        status:           'draft'
      };

      document.getElementById('error-msg').style.display = 'none';
      var btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Saving...';

      db.auth.getUser().then(function(userRes) {
        if (!userRes.data.user) { window.location.href = '/login.html'; return; }
        data.user_id = userRes.data.user.id;
        db.from('lien_waivers').insert(data).select().single().then(function(res) {
          if (res.error) { showError('Error saving: ' + res.error.message); btn.disabled = false; btn.textContent = 'Generate Lien Waiver'; return; }
          window.location.href = '/lien-waiver.html?id=' + res.data.id + '&generate=true';
        });
      });
    }
  </script>
</body>
</html>
