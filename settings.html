<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F59E0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BuildOrder">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lang.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#090E1A; --bg2:#111827; --bg3:#1A2438; --amber:#F59E0B; --amber2:#FCD34D; --white:#F8FAFC; --muted:#94A3B8; --dim:#475569; --border:rgba(255,255,255,0.07); --green:#34D399; --red:#EF4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
    .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; color: var(--dim); cursor: pointer; font-family: inherit; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .btn-back:hover { color: var(--white); border-color: var(--amber); }
    .main { max-width: 700px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem 2rem; margin-bottom: 1.5rem; }
    .section-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.25rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-field { margin-bottom: 1rem; }
    .form-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 0.35rem; }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.85rem; color: var(--white); font-family: inherit; outline: none; }
    .form-input:focus { border-color: var(--amber); }
    .form-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save { background: var(--amber); color: #090E1A; border: none; border-radius: 10px; padding: 0.6rem 1.5rem; font-size: 0.85rem; font-weight: 900; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: var(--amber2); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Plan section */
    .plan-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 1rem; }
    .plan-badge { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; padding: 0.25rem 0.8rem; border-radius: 100px; }
    .badge-free    { background: rgba(148,163,184,0.12); color: var(--muted); }
    .badge-pro     { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge-biz     { background: rgba(52,211,153,0.15); color: var(--green); }
    .badge-founder { background: rgba(139,92,246,0.18); color: #C4B5FD; }
    .usage-track { background: rgba(255,255,255,0.06); border-radius: 100px; height: 5px; margin: 0.6rem 0 0.35rem; overflow: hidden; }
    .usage-fill { height: 100%; border-radius: 100px; background: var(--amber); transition: width 0.5s; }
    .usage-fill.danger { background: var(--red); }
    .usage-text { font-size: 0.78rem; color: var(--muted); }
    .usage-text strong { color: var(--white); }
    .btn-upgrade { display: inline-block; background: var(--amber); color: #090E1A; border: none; border-radius: 10px; padding: 0.55rem 1.25rem; font-size: 0.82rem; font-weight: 900; cursor: pointer; font-family: inherit; text-decoration: none; }
    .btn-upgrade:hover { background: var(--amber2); }
    .btn-portal { background: none; border: 1px solid var(--border); border-radius: 10px; padding: 0.55rem 1.25rem; font-size: 0.82rem; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; transition: color 0.2s, border-color 0.2s; }
    .btn-portal:hover { color: var(--white); border-color: var(--amber); }
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1.25rem; font-size: 0.85rem; font-weight: 600; color: var(--green); opacity: 0; transform: translateY(10px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 550px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <a href="/dashboard.html" class="btn-back">&larr; Dashboard</a>
  </nav>

  <main class="main" id="main-content">
    <div style="text-align:center;padding:4rem;color:var(--muted);">Loading&hellip;</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    var SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'bo-auth' } });
    var sessionToken = '';
    var userId = '';

    async function init() {
      var sessionRes = await db.auth.getSession();
      if (!sessionRes.data.session) { window.location.href = '/login.html'; return; }
      sessionToken = sessionRes.data.session.access_token;
      userId = sessionRes.data.session.user.id;
      var profileRes = await db.from('contractor_profiles').select('*').eq('id', userId).single();
      var profile = profileRes.data;
      if (!profile) { window.location.href = '/onboarding.html'; return; }

      // Compute effective plan (founding member override)
      var isFounder = profile.founding_member && profile.pro_expires_at && new Date(profile.pro_expires_at) > new Date();
      var effectivePlan = isFounder ? 'pro' : (profile.plan || 'free');

      // Usage (free plan only)
      var usageCount = 0;
      if (effectivePlan === 'free') {
        var monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
        var usageRes = await db.from('usage_events').select('id', { count: 'exact', head: true }).eq('user_id', userId).gte('created_at', monthStart);
        usageCount = usageRes.count || 0;
      }

      renderPage(profile, usageCount, effectivePlan, isFounder);
    }

    function renderPage(p, usageCount, effectivePlan, isFounder) {
      var planBadgeClass = { free: 'badge-free', pro: 'badge-pro', business: 'badge-biz' }[effectivePlan] || 'badge-free';
      var planLabel = { free: 'Free Plan', pro: '⭐ Pro Plan', business: '⭐ Business Plan' }[effectivePlan] || 'Free Plan';

      var billingSection = '';
      if (effectivePlan === 'free') {
        var pct = Math.min(100, (usageCount / 5) * 100);
        var dangerClass = usageCount >= 4 ? ' danger' : '';
        billingSection = '<div class="plan-row"><div><span class="plan-badge badge-free">Free Plan</span></div><a href="/pricing.html" class="btn-upgrade">&#128640; Upgrade to Pro &mdash; $19/mo</a></div>' +
          '<div class="usage-text"><strong>' + usageCount + '</strong> of 5 documents used this month</div>' +
          '<div class="usage-track"><div class="usage-fill' + dangerClass + '" style="width:' + pct + '%"></div></div>';
      } else {
        var founderBadge = isFounder
          ? ' &nbsp;<span class="plan-badge badge-founder" style="font-size:0.65rem;">&#10022; Founding Member</span>'
          : '';
        var expiryNote = isFounder && p.pro_expires_at
          ? '<div style="font-size:0.78rem;color:var(--muted);margin-top:0.4rem;">Founding member access through ' + new Date(p.pro_expires_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + '</div>'
          : '';
        var billingBtn = isFounder
          ? ''  // no Stripe portal for founding members
          : '<button class="btn-portal" onclick="openPortal()">Manage Billing &rarr;</button>';
        billingSection = '<div class="plan-row"><div><span class="plan-badge ' + planBadgeClass + '">' + planLabel + '</span>' + founderBadge + '</div>' + billingBtn + '</div>' +
          '<div style="font-size:0.82rem;color:var(--muted);">Unlimited documents &middot; All features included</div>' +
          expiryNote;
      }

      document.getElementById('main-content').innerHTML =
        '<div class="section">' +
          '<div class="section-title">Plan &amp; Billing</div>' +
          billingSection +
        '</div>' +

        '<div class="section">' +
          '<div class="section-title">Business Profile</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">Your Name</label><input class="form-input" type="text" id="f-cname" value="' + esc(p.contractor_name) + '"></div>' +
            '<div class="form-field"><label class="form-label">Business Name</label><input class="form-input" type="text" id="f-bname" value="' + esc(p.business_name) + '"></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">Phone</label><input class="form-input" type="tel" id="f-phone" value="' + esc(p.phone) + '"></div>' +
            '<div class="form-field"><label class="form-label">Email</label><input class="form-input" type="email" id="f-email" value="' + esc(p.email) + '" disabled></div>' +
          '</div>' +
          '<div class="form-field"><label class="form-label">Street Address</label><input class="form-input" type="text" id="f-address" value="' + esc(p.address) + '"></div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">City</label><input class="form-input" type="text" id="f-city" value="' + esc(p.city) + '"></div>' +
            '<div class="form-field"><label class="form-label">State</label><input class="form-input" type="text" id="f-state" value="' + esc(p.state) + '" maxlength="2"></div>' +
          '</div>' +
          '<div class="form-field"><label class="form-label">ZIP</label><input class="form-input" type="text" id="f-zip" value="' + esc(p.zip) + '" maxlength="10" style="max-width:160px;"></div>' +
          '<button class="btn-save" id="save-btn" onclick="saveProfile()">Save Profile</button>' +
        '</div>' +

        '<div class="section">' +
          '<div class="section-title">License &amp; Insurance</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">License Number</label><input class="form-input" type="text" id="f-lic" value="' + esc(p.license_number) + '"></div>' +
            '<div class="form-field"><label class="form-label">License Type</label><input class="form-input" type="text" id="f-lictype" value="' + esc(p.license_type) + '"></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">GL Provider</label><input class="form-input" type="text" id="f-glprov" value="' + esc(p.gl_provider) + '"></div>' +
            '<div class="form-field"><label class="form-label">GL Status</label><input class="form-input" type="text" id="f-glstat" value="' + esc(p.gl_status) + '"></div>' +
          '</div>' +
          '<button class="btn-save" id="save-btn-2" onclick="saveProfile()">Save License Info</button>' +
        '</div>';
    }

    async function saveProfile() {
      var btn = document.getElementById('save-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
      var btn2 = document.getElementById('save-btn-2');
      if (btn2) { btn2.disabled = true; btn2.textContent = 'Saving…'; }

      var updates = {};
      var f = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
      if (f('f-cname'))   updates.contractor_name = f('f-cname');
      if (f('f-bname'))   updates.business_name   = f('f-bname');
      if (f('f-phone'))   updates.phone           = f('f-phone');
      if (f('f-address')) updates.address         = f('f-address');
      if (f('f-city'))    updates.city            = f('f-city');
      if (f('f-state'))   updates.state           = f('f-state').toUpperCase();
      if (f('f-zip'))     updates.zip             = f('f-zip');
      if (document.getElementById('f-lic'))     updates.license_number = f('f-lic');
      if (document.getElementById('f-lictype')) updates.license_type   = f('f-lictype');
      if (document.getElementById('f-glprov'))  updates.gl_provider    = f('f-glprov');
      if (document.getElementById('f-glstat'))  updates.gl_status      = f('f-glstat');

      var res = await db.from('contractor_profiles').update(updates).eq('id', userId);
      if (btn) { btn.disabled = false; btn.textContent = 'Save Profile'; }
      if (btn2) { btn2.disabled = false; btn2.textContent = 'Save License Info'; }
      if (res.error) { alert('Error saving: ' + res.error.message); return; }
      showToast('Profile saved!');
    }

    async function openPortal() {
      var res = await fetch('/api/customer-portal', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + sessionToken }
      });
      var data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else { alert('Could not open billing portal. Please try again.'); }
    }

    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

    function showToast(msg) {
      var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    init();
  </script>
</body>
</html>
