<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F59E0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BuildOrder">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lang.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#090E1A; --bg2:#111827; --bg3:#1A2438; --amber:#F59E0B; --amber2:#FCD34D; --white:#F8FAFC; --muted:#94A3B8; --dim:#475569; --border:rgba(255,255,255,0.07); --green:#34D399; --red:#EF4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
    .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; color: var(--dim); cursor: pointer; font-family: inherit; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .btn-back:hover { color: var(--white); border-color: var(--amber); }
    .main { max-width: 700px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem 2rem; margin-bottom: 1.5rem; }
    .section-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.25rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-field { margin-bottom: 1rem; }
    .form-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 0.35rem; }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.85rem; color: var(--white); font-family: inherit; outline: none; }
    .form-input:focus { border-color: var(--amber); }
    .form-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save { background: var(--amber); color: #090E1A; border: none; border-radius: 10px; padding: 0.6rem 1.5rem; font-size: 0.85rem; font-weight: 900; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: var(--amber2); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Plan section */
    .plan-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 1rem; }
    .plan-badge { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; padding: 0.25rem 0.8rem; border-radius: 100px; }
    .badge-free    { background: rgba(148,163,184,0.12); color: var(--muted); }
    .badge-pro     { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge-biz     { background: rgba(52,211,153,0.15); color: var(--green); }
    .badge-founder { background: rgba(139,92,246,0.18); color: #C4B5FD; }
    .usage-track { background: rgba(255,255,255,0.06); border-radius: 100px; height: 5px; margin: 0.6rem 0 0.35rem; overflow: hidden; }
    .usage-fill { height: 100%; border-radius: 100px; background: var(--amber); transition: width 0.5s; }
    .usage-fill.danger { background: var(--red); }
    .usage-text { font-size: 0.78rem; color: var(--muted); }
    .usage-text strong { color: var(--white); }
    .btn-upgrade { display: inline-block; background: var(--amber); color: #090E1A; border: none; border-radius: 10px; padding: 0.55rem 1.25rem; font-size: 0.82rem; font-weight: 900; cursor: pointer; font-family: inherit; text-decoration: none; }
    .btn-upgrade:hover { background: var(--amber2); }
    .btn-portal { background: none; border: 1px solid var(--border); border-radius: 10px; padding: 0.55rem 1.25rem; font-size: 0.82rem; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; transition: color 0.2s, border-color 0.2s; }
    .btn-portal:hover { color: var(--white); border-color: var(--amber); }
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1.25rem; font-size: 0.85rem; font-weight: 600; color: var(--green); opacity: 0; transform: translateY(10px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 550px) { .form-row { grid-template-columns: 1fr; } }
    /* Logo upload */
    .logo-preview-wrap { display:flex; align-items:center; gap:1.25rem; margin-bottom:1.25rem; }
    .logo-preview-img { width:80px; height:80px; border-radius:10px; object-fit:contain; background:var(--bg3); border:1px solid var(--border); padding:6px; display:none; }
    .logo-placeholder { width:80px; height:80px; border-radius:10px; background:var(--bg3); border:1px dashed rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:1.6rem; flex-shrink:0; }
    .logo-upload-actions { display:flex; gap:0.6rem; flex-wrap:wrap; }
    .btn-upload-logo { background:var(--amber); color:#090E1A; border:none; border-radius:8px; padding:0.45rem 1rem; font-size:0.78rem; font-weight:800; cursor:pointer; font-family:inherit; transition:background 0.15s; }
    .btn-upload-logo:hover { background:var(--amber2); }
    .btn-remove-logo { background:none; border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:0.45rem 1rem; font-size:0.78rem; font-weight:600; color:var(--red); cursor:pointer; font-family:inherit; transition:background 0.15s; }
    .btn-remove-logo:hover { background:rgba(239,68,68,0.08); }
    /* Stripe Connect */
    .stripe-connected { display:flex; align-items:center; gap:0.85rem; background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.25); border-radius:10px; padding:0.9rem 1.1rem; }
    .stripe-connected-icon { font-size:1.3rem; color:var(--green); flex-shrink:0; }
    .stripe-connected-lbl { font-size:0.85rem; font-weight:700; color:var(--green); }
    .stripe-connected-sub { font-size:0.75rem; color:var(--muted); margin-top:0.15rem; }
    .btn-stripe-disconnect { margin-left:auto; background:none; border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:0.35rem 0.85rem; font-size:0.75rem; font-weight:600; color:var(--red); cursor:pointer; font-family:inherit; white-space:nowrap; flex-shrink:0; transition:background 0.15s; }
    .btn-stripe-disconnect:hover { background:rgba(239,68,68,0.08); }
    .btn-connect-stripe { display:inline-flex; align-items:center; gap:0.5rem; background:var(--amber); color:#090E1A; border:none; border-radius:10px; padding:0.6rem 1.4rem; font-size:0.85rem; font-weight:900; cursor:pointer; font-family:inherit; text-decoration:none; transition:background 0.2s; }
    .btn-connect-stripe:hover { background:var(--amber2); }
    /* Rate Library */
    .lib-item-row { display:grid; grid-template-columns:1fr 80px 100px 32px; gap:0.5rem; align-items:center; padding:0.65rem 0.75rem; border-bottom:1px solid var(--border); font-size:0.85rem; }
    .lib-item-row:last-child { border-bottom:none; }
    .lib-item-desc { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lib-item-unit { color:var(--muted); font-size:0.78rem; }
    .lib-item-price { font-weight:700; color:var(--amber); font-size:0.85rem; }
    .btn-del { background:none; border:1px solid rgba(239,68,68,0.25); border-radius:6px; color:var(--red); cursor:pointer; font-size:1rem; width:30px; height:30px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; flex-shrink:0; }
    .btn-del:hover { background:rgba(239,68,68,0.1); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <a href="/dashboard.html" class="btn-back">&larr; Dashboard</a>
      <a href="/support.html" class="btn-back">&#10067; Support</a>
    </div>
  </nav>

  <main class="main" id="main-content">
    <div style="text-align:center;padding:4rem;color:var(--muted);">Loading&hellip;</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    var SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'bo-auth' } });
    var sessionToken = '';
    var userId = '';

    async function connectStripe(e) {
      e.preventDefault();
      var btn = document.getElementById('connect-stripe-btn');
      if (btn) { btn.textContent = 'Redirecting to Stripe…'; btn.disabled = true; }
      var res = await fetch('/api/stripe-connect', { headers: { 'Authorization': 'Bearer ' + sessionToken } });
      var d = await res.json();
      if (d.oauth_url) {
        window.location.href = d.oauth_url;
      } else {
        if (btn) { btn.textContent = '\u{1F4B3}  Connect Stripe Account'; btn.disabled = false; }
        alert('Could not start Stripe connection. Please try again.');
      }
    }

    async function disconnectStripe() {
      if (!confirm('Disconnect your Stripe account? Clients will no longer see a Pay by Card button on your invoices.')) return;
      var res = await fetch('/api/stripe-connect', {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + sessionToken }
      });
      if (res.ok) {
        showToast('Stripe account disconnected.');
        setTimeout(function() { window.location.reload(); }, 900);
      } else {
        var d = await res.json();
        alert('Error disconnecting: ' + (d.error || 'Unknown error'));
      }
    }

    async function init() {
      var sessionRes = await db.auth.getSession();
      if (!sessionRes.data.session) { window.location.href = '/login.html'; return; }
      sessionToken = sessionRes.data.session.access_token;
      userId = sessionRes.data.session.user.id;

      // ── Handle Stripe Connect Account Link return ─────────────────────────
      // Stripe redirects back to settings.html?connect=success or ?connect=refresh
      var urlParams = new URLSearchParams(window.location.search);
      var connectParam = urlParams.get('connect');
      if (connectParam) {
        window.history.replaceState({}, '', '/settings.html');
        if (connectParam === 'success') {
          // Account ID was already saved before redirecting — just show the toast
          window._stripeJustConnected = true;
        } else if (connectParam === 'refresh') {
          // Link expired before they completed onboarding — let them try again
          window._stripeConnectRefresh = true;
        }
        // Profile reload below will pick up the current stripe_account_id
      }

      var profileRes = await db.from('contractor_profiles').select('*').eq('id', userId).single();
      var profile = profileRes.data;
      if (!profile) { window.location.href = '/onboarding.html'; return; }

      // Compute effective plan (founding member override)
      var isFounder = profile.founding_member && profile.pro_expires_at && new Date(profile.pro_expires_at) > new Date();
      var effectivePlan = isFounder ? 'pro' : (profile.plan || 'free');

      // Usage (free plan only)
      var usageCount = 0;
      if (effectivePlan === 'free') {
        var monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
        var usageRes = await db.from('usage_events').select('id', { count: 'exact', head: true }).eq('user_id', userId).gte('created_at', monthStart);
        usageCount = usageRes.count || 0;
      }

      renderPage(profile, usageCount, effectivePlan, isFounder);
      if (window._stripeJustConnected) { showToast('Stripe account connected! ✓'); }
      if (window._stripeConnectRefresh) { showToast('Connection timed out — click Connect Stripe Account to try again.'); }
      await loadRateLibrary();
      if (effectivePlan === 'business') await loadTeamMembers();
    }

    function renderPage(p, usageCount, effectivePlan, isFounder) {
      var planBadgeClass = { free: 'badge-free', pro: 'badge-pro', business: 'badge-biz' }[effectivePlan] || 'badge-free';
      var planLabel = { free: 'Free Plan', pro: '⭐ Pro Plan', business: '⭐ Business Plan' }[effectivePlan] || 'Free Plan';

      var billingSection = '';
      if (effectivePlan === 'free') {
        var pct = Math.min(100, (usageCount / 5) * 100);
        var dangerClass = usageCount >= 4 ? ' danger' : '';
        billingSection = '<div class="plan-row"><div><span class="plan-badge badge-free">Free Plan</span></div><a href="/pricing.html" class="btn-upgrade">&#128640; Upgrade to Pro &mdash; $19/mo</a></div>' +
          '<div class="usage-text"><strong>' + usageCount + '</strong> of 5 documents used this month</div>' +
          '<div class="usage-track"><div class="usage-fill' + dangerClass + '" style="width:' + pct + '%"></div></div>';
      } else {
        var founderBadge = isFounder
          ? ' &nbsp;<span class="plan-badge badge-founder" style="font-size:0.65rem;">&#10022; Founding Member</span>'
          : '';
        var expiryNote = isFounder && p.pro_expires_at
          ? '<div style="font-size:0.78rem;color:var(--muted);margin-top:0.4rem;">Founding member access through ' + new Date(p.pro_expires_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + '</div>'
          : '';
        var billingBtn = isFounder
          ? ''  // no Stripe portal for founding members
          : '<button class="btn-portal" onclick="openPortal()">Manage Billing &rarr;</button>';
        billingSection = '<div class="plan-row"><div><span class="plan-badge ' + planBadgeClass + '">' + planLabel + '</span>' + founderBadge + '</div>' + billingBtn + '</div>' +
          '<div style="font-size:0.82rem;color:var(--muted);">Unlimited documents &middot; All features included</div>' +
          expiryNote;
      }

      document.getElementById('main-content').innerHTML =
        '<div class="section">' +
          '<div class="section-title">Plan &amp; Billing</div>' +
          billingSection +
        '</div>' +

        '<div class="section">' +
          '<div class="section-title">Business Profile</div>' +

          // ── Logo upload ──────────────────────────────────────────────
          '<div style="margin-bottom:1.5rem;">' +
            '<label class="form-label">Business Logo</label>' +
            '<div class="logo-preview-wrap">' +
              (p.logo_url
                ? '<img id="logo-preview-img" class="logo-preview-img" src="' + esc(p.logo_url) + '" style="display:block;" alt="Logo">'
                : '<div class="logo-placeholder" id="logo-placeholder">🏗️</div>' +
                  '<img id="logo-preview-img" class="logo-preview-img" src="" alt="Logo">') +
              '<div>' +
                '<div class="logo-upload-actions">' +
                  '<button class="btn-upload-logo" onclick="document.getElementById(\'logo-file-input\').click()">Upload Logo</button>' +
                  (p.logo_url ? '<button class="btn-remove-logo" onclick="removeLogo()">Remove</button>' : '') +
                '</div>' +
                '<p style="font-size:0.72rem;color:var(--dim);margin-top:0.5rem;line-height:1.5;">JPG, PNG, or SVG &mdash; max 2 MB.<br>Appears on emails and the client sign page.</p>' +
              '</div>' +
            '</div>' +
            '<input type="file" id="logo-file-input" accept="image/*" style="display:none" onchange="handleLogoFile(this)">' +
          '</div>' +

          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">Your Name</label><input class="form-input" type="text" id="f-cname" value="' + esc(p.contractor_name) + '"></div>' +
            '<div class="form-field"><label class="form-label">Business Name</label><input class="form-input" type="text" id="f-bname" value="' + esc(p.business_name) + '"></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">Phone</label><input class="form-input" type="tel" id="f-phone" value="' + esc(p.phone) + '"></div>' +
            '<div class="form-field"><label class="form-label">Email</label><input class="form-input" type="email" id="f-email" value="' + esc(p.email) + '" disabled></div>' +
          '</div>' +
          '<div class="form-field"><label class="form-label">Street Address</label><input class="form-input" type="text" id="f-address" value="' + esc(p.address) + '"></div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">City</label><input class="form-input" type="text" id="f-city" value="' + esc(p.city) + '"></div>' +
            '<div class="form-field"><label class="form-label">State</label><input class="form-input" type="text" id="f-state" value="' + esc(p.state) + '" maxlength="2"></div>' +
          '</div>' +
          '<div class="form-field"><label class="form-label">ZIP</label><input class="form-input" type="text" id="f-zip" value="' + esc(p.zip) + '" maxlength="10" style="max-width:160px;"></div>' +
          '<div class="form-field" style="margin-top:0.25rem;"><label class="form-label">Google Review Link <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--dim);">(optional — clients see this after paying)</span></label><input class="form-input" type="url" id="f-review-url" value="' + esc(p.google_review_url || '') + '" placeholder="https://g.page/r/…/review"></div>' +
          '<button class="btn-save" id="save-btn" onclick="saveProfile()">Save Profile</button>' +
        '</div>' +

        '<div class="section">' +
          '<div class="section-title">License &amp; Insurance</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">License Number</label><input class="form-input" type="text" id="f-lic" value="' + esc(p.license_number) + '"></div>' +
            '<div class="form-field"><label class="form-label">License Type</label><input class="form-input" type="text" id="f-lictype" value="' + esc(p.license_type) + '"></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">GL Provider</label><input class="form-input" type="text" id="f-glprov" value="' + esc(p.gl_provider) + '"></div>' +
            '<div class="form-field"><label class="form-label">GL Status</label><input class="form-input" type="text" id="f-glstat" value="' + esc(p.gl_status) + '"></div>' +
          '</div>' +
          '<button class="btn-save" id="save-btn-2" onclick="saveProfile()">Save License Info</button>' +
        '</div>' +

        '<div class="section">' +
          '<div class="section-title">Payment Info</div>' +
          '<p style="font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;">These print on every invoice you generate in the <strong style="color:var(--white);">How to Pay</strong> section. Fill in whichever methods you accept.</p>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">Venmo</label><input class="form-input" type="text" id="f-venmo" placeholder="@yourbusiness" value="' + esc(p.payment_venmo) + '"></div>' +
            '<div class="form-field"><label class="form-label">Zelle</label><input class="form-input" type="text" id="f-zelle" placeholder="email or phone number" value="' + esc(p.payment_zelle) + '"></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label class="form-label">Cash App</label><input class="form-input" type="text" id="f-cashapp" placeholder="$yourcashtag" value="' + esc(p.payment_cashapp) + '"></div>' +
            '<div class="form-field"><label class="form-label">Check Payable To</label><input class="form-input" type="text" id="f-check" placeholder="Your Business Name" value="' + esc(p.payment_check_payable) + '"></div>' +
          '</div>' +
          '<div class="form-field"><label class="form-label">Payment Link / Other Instructions</label><input class="form-input" type="text" id="f-payment-other" placeholder="Stripe link, bank wire info, credit card instructions, etc." value="' + esc(p.payment_other) + '"></div>' +
          '<button class="btn-save" id="save-btn-3" onclick="saveProfile()">Save Payment Info</button>' +
        '</div>' +

        '<div class="section">' +
          '<div class="section-title">Accept Card Payments</div>' +
          '<p style="font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;">When connected, a <strong style="color:var(--white);">Pay by Card</strong> button appears on every invoice link you share. Money goes directly to your Stripe account &mdash; BuildOrder never touches it.</p>' +
          (p.stripe_account_id
            ? '<div class="stripe-connected">' +
                '<div class="stripe-connected-icon">&#10003;</div>' +
                '<div><div class="stripe-connected-lbl">Stripe Account Connected</div>' +
                '<div class="stripe-connected-sub">Card payments go directly to your bank account.</div></div>' +
                '<button class="btn-stripe-disconnect" onclick="disconnectStripe()">Disconnect</button>' +
              '</div>'
            : '<button class="btn-connect-stripe" id="connect-stripe-btn" onclick="connectStripe(event)">&#128179;&nbsp; Connect Stripe Account</button>'
          ) +
        '</div>' +

        '<div class="section">' +
          '<div class="section-title">Rate Library</div>' +
          '<p style="font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;">These rates power the AI pricing on every estimate, proposal, and Quick Quote you generate. The more you fill in, the more accurate your documents will be. <a href="/how-it-works.html" style="color:var(--amber);text-decoration:none;" target="_blank">How does pricing work? &#8599;</a></p>' +

          '<div style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.18);border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:1.5rem;">' +
            '<div style="font-size:0.7rem;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.85rem;">AI Pricing Defaults</div>' +
            '<div class="form-row">' +
              '<div class="form-field">' +
                '<label class="form-label">Your Labor Rate <span style="font-weight:400;text-transform:none;color:var(--dim);">($/hr)</span></label>' +
                '<input class="form-input" type="number" id="f-labor-rate" placeholder="e.g. 85" min="0" step="0.01" value="' + (p.labor_rate || '') + '">' +
                '<div style="font-size:0.7rem;color:var(--dim);margin-top:0.3rem;">AI uses this for all labor line items</div>' +
              '</div>' +
              '<div class="form-field">' +
                '<label class="form-label">Material Markup <span style="font-weight:400;text-transform:none;color:var(--dim);">(%)</span></label>' +
                '<input class="form-input" type="number" id="f-markup-pct" placeholder="e.g. 20" min="0" max="200" step="1" value="' + (p.markup_pct || '') + '">' +
                '<div style="font-size:0.7rem;color:var(--dim);margin-top:0.3rem;">Applied on top of material costs</div>' +
              '</div>' +
            '</div>' +
            '<button class="btn-save" onclick="saveRateDefaults()" id="save-rate-defaults-btn" style="margin-top:0.25rem;">Save Pricing Defaults</button>' +
          '</div>' +

          '<div style="font-size:0.7rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.65rem;">Price List <span style="font-weight:400;text-transform:none;letter-spacing:0;">&mdash; specific materials &amp; services</span></div>' +
          '<div id="rate-library-items"><div style="color:var(--muted);font-size:0.82rem;padding:0.25rem 0;">Loading…</div></div>' +
          '<div class="form-row" style="margin-top:1.25rem;">' +
            '<div class="form-field"><label class="form-label">Item / Material</label><input class="form-input" type="text" id="lib-desc" placeholder="e.g. GAF Timberline HDZ shingles"></div>' +
            '<div class="form-field"><label class="form-label">Unit <span style="font-weight:400;text-transform:none;color:var(--dim);">(optional)</span></label><input class="form-input" type="text" id="lib-unit" placeholder="sq, hr, sq ft, each…"></div>' +
          '</div>' +
          '<div style="display:flex;gap:0.75rem;align-items:flex-end;">' +
            '<div class="form-field" style="flex:1;margin-bottom:0;"><label class="form-label">Your Price ($)</label><input class="form-input" type="number" id="lib-price" placeholder="0.00" min="0" step="0.01"></div>' +
            '<button class="btn-save" onclick="addTemplate()" style="flex-shrink:0;margin-bottom:1px;">+ Add Item</button>' +
          '</div>' +
        '</div>' +

        // ── Team Members (Business plan only) ──────────────────────────────
        (effectivePlan === 'business' ?
        '<div class="section" id="team-section">' +
          '<div class="section-title">Team Members</div>' +
          '<p style="font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;">Invite employees or subcontractors to generate documents under your account. They create their own login — no charge to them.</p>' +
          '<div id="team-list"><div style="color:var(--muted);font-size:0.82rem;">Loading…</div></div>' +
          '<div style="display:flex;gap:0.75rem;align-items:flex-end;margin-top:1.25rem;">' +
            '<div class="form-field" style="flex:1;margin-bottom:0;"><label class="form-label">Invite by Email</label><input class="form-input" type="email" id="team-invite-email" placeholder="colleague@example.com"></div>' +
            '<button class="btn-save" onclick="inviteTeamMember()" style="flex-shrink:0;margin-bottom:1px;">Send Invite</button>' +
          '</div>' +
          '<div class="msg" id="team-msg" style="color:var(--green);min-height:1rem;margin-top:0.5rem;font-size:0.8rem;"></div>' +
        '</div>'
        : '') +

        '';
    }

    async function saveProfile() {
      var btn = document.getElementById('save-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
      var btn2 = document.getElementById('save-btn-2');
      if (btn2) { btn2.disabled = true; btn2.textContent = 'Saving…'; }
      var btn3 = document.getElementById('save-btn-3');
      if (btn3) { btn3.disabled = true; btn3.textContent = 'Saving…'; }

      var updates = {};
      var f = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
      if (f('f-cname'))   updates.contractor_name = f('f-cname');
      if (f('f-bname'))   updates.business_name   = f('f-bname');
      if (f('f-phone'))   updates.phone           = f('f-phone');
      if (f('f-address')) updates.address         = f('f-address');
      if (f('f-city'))    updates.city            = f('f-city');
      if (f('f-state'))   updates.state           = f('f-state').toUpperCase();
      if (f('f-zip'))     updates.zip             = f('f-zip');
      if (document.getElementById('f-lic'))     updates.license_number = f('f-lic');
      if (document.getElementById('f-lictype')) updates.license_type   = f('f-lictype');
      if (document.getElementById('f-glprov'))  updates.gl_provider    = f('f-glprov');
      if (document.getElementById('f-glstat'))  updates.gl_status      = f('f-glstat');
      if (document.getElementById('f-venmo'))         updates.payment_venmo         = f('f-venmo');
      if (document.getElementById('f-zelle'))         updates.payment_zelle         = f('f-zelle');
      if (document.getElementById('f-cashapp'))       updates.payment_cashapp       = f('f-cashapp');
      if (document.getElementById('f-check'))         updates.payment_check_payable = f('f-check');
      if (document.getElementById('f-payment-other')) updates.payment_other         = f('f-payment-other');
      if (document.getElementById('f-review-url'))   updates.google_review_url     = f('f-review-url') || null;

      var res = await db.from('contractor_profiles').update(updates).eq('id', userId);
      if (btn) { btn.disabled = false; btn.textContent = 'Save Profile'; }
      if (btn2) { btn2.disabled = false; btn2.textContent = 'Save License Info'; }
      if (btn3) { btn3.disabled = false; btn3.textContent = 'Save Payment Info'; }
      if (res.error) { alert('Error saving: ' + res.error.message); return; }
      showToast('Profile saved!');
    }

    async function saveRateDefaults() {
      var btn = document.getElementById('save-rate-defaults-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
      var laborRate = parseFloat(document.getElementById('f-labor-rate').value) || null;
      var markupPct = parseInt(document.getElementById('f-markup-pct').value)   || null;
      var updates = {};
      if (laborRate !== null) updates.labor_rate = laborRate;
      if (markupPct !== null) updates.markup_pct = markupPct;
      if (laborRate === null) updates.labor_rate = null;
      if (markupPct === null) updates.markup_pct = null;
      var res = await db.from('contractor_profiles').update(updates).eq('id', userId);
      if (btn) { btn.disabled = false; btn.textContent = 'Save Pricing Defaults'; }
      if (res.error) { alert('Error saving: ' + res.error.message); return; }
      showToast('Pricing defaults saved!');
    }

    async function loadRateLibrary() {
      var container = document.getElementById('rate-library-items');
      if (!container) return;
      var res = await db.from('line_item_templates').select('*').eq('user_id', userId).order('description');
      var items = res.data || [];
      if (items.length === 0) {
        container.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:0.25rem 0;">No saved items yet — add your first item below.</div>';
        return;
      }
      container.innerHTML =
        '<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:0.25rem;">' +
        items.map(function(item) {
          var price = Number(item.unit_price || 0).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
          return '<div class="lib-item-row">' +
            '<div class="lib-item-desc" title="' + esc(item.description) + '">' + esc(item.description) + '</div>' +
            '<div class="lib-item-unit">' + esc(item.unit || '—') + '</div>' +
            '<div class="lib-item-price">$' + price + '</div>' +
            '<button class="btn-del" onclick="deleteTemplate(\'' + item.id + '\')" title="Delete">&times;</button>' +
          '</div>';
        }).join('') +
        '</div>';
    }

    async function addTemplate() {
      var desc  = (document.getElementById('lib-desc').value  || '').trim();
      var unit  = (document.getElementById('lib-unit').value  || '').trim();
      var price = parseFloat(document.getElementById('lib-price').value) || 0;
      if (!desc) { document.getElementById('lib-desc').focus(); return; }
      var res = await db.from('line_item_templates').insert({ user_id: userId, description: desc, unit: unit || null, unit_price: price });
      if (res.error) { alert('Error saving item: ' + res.error.message); return; }
      document.getElementById('lib-desc').value  = '';
      document.getElementById('lib-unit').value  = '';
      document.getElementById('lib-price').value = '';
      showToast('Item added to library!');
      await loadRateLibrary();
    }

    async function deleteTemplate(id) {
      if (!confirm('Remove this item from your rate library?')) return;
      await db.from('line_item_templates').delete().eq('id', id).eq('user_id', userId);
      await loadRateLibrary();
    }

    // ── Team Members ───────────────────────────────────────────────────────
    async function loadTeamMembers() {
      var container = document.getElementById('team-list');
      if (!container) return;
      var res = await fetch('/api/team', { headers: { 'Authorization': 'Bearer ' + sessionToken } });
      if (!res.ok) { container.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;">Could not load team.</div>'; return; }
      var data = await res.json();
      var members = data.members || [];
      if (!members.length) {
        container.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:0.25rem 0;">No team members yet. Invite someone below.</div>';
        return;
      }
      container.innerHTML =
        '<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">' +
        members.map(function(m) {
          var statusColor = m.status === 'active' ? 'var(--green)' : 'var(--amber)';
          var statusLabel = m.status === 'active' ? 'Active' : 'Pending invite';
          return '<div style="display:flex;align-items:center;gap:0.85rem;padding:0.75rem 1rem;border-bottom:1px solid var(--border);">' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-size:0.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + m.member_email + '</div>' +
              '<div style="font-size:0.72rem;color:' + statusColor + ';margin-top:0.15rem;">' + statusLabel + '</div>' +
            '</div>' +
            '<button onclick="removeTeamMember(\'' + m.id + '\',\'' + m.member_email.replace(/'/g,"\\'") + '\')" style="background:none;border:1px solid transparent;border-radius:6px;padding:0.25rem 0.6rem;font-size:0.72rem;font-weight:600;color:var(--dim);cursor:pointer;font-family:inherit;transition:color 0.15s;" onmouseover="this.style.color=\'var(--red)\'" onmouseout="this.style.color=\'var(--dim)\'">Remove</button>' +
          '</div>';
        }).join('') +
        '</div>';
    }

    async function inviteTeamMember() {
      var email = (document.getElementById('team-invite-email').value || '').trim();
      if (!email) { document.getElementById('team-invite-email').focus(); return; }
      var msg = document.getElementById('team-msg');
      msg.style.color = 'var(--muted)'; msg.textContent = 'Sending invite…';
      var res = await fetch('/api/team', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken },
        body: JSON.stringify({ email: email })
      });
      var data = await res.json();
      if (res.ok && data.success) {
        msg.style.color = 'var(--green)'; msg.textContent = 'Invite sent to ' + email + '!';
        document.getElementById('team-invite-email').value = '';
        await loadTeamMembers();
      } else {
        msg.style.color = 'var(--red)'; msg.textContent = data.error || 'Failed to send invite.';
      }
    }

    async function removeTeamMember(id, email) {
      if (!confirm('Remove ' + email + ' from your team?')) return;
      var res = await fetch('/api/team', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken },
        body: JSON.stringify({ member_id: id })
      });
      if (res.ok) { await loadTeamMembers(); showToast('Team member removed.'); }
      else { alert('Failed to remove team member.'); }
    }

    // ── Logo upload ────────────────────────────────────────────────────────
    function handleLogoFile(input) {
      var file = input.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { alert('Logo must be under 2 MB.'); input.value = ''; return; }
      var allowed = ['image/jpeg','image/jpg','image/png','image/gif','image/webp','image/svg+xml'];
      if (!allowed.includes(file.type.toLowerCase())) { alert('Only JPG, PNG, GIF, WebP, or SVG files are allowed.'); input.value = ''; return; }

      var reader = new FileReader();
      reader.onload = async function(e) {
        var base64   = e.target.result.split(',')[1];
        var mimeType = file.type;
        var ext      = file.name.split('.').pop().toLowerCase();

        showToast('Uploading logo…');

        var res = await fetch('/api/upload-logo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken },
          body: JSON.stringify({ base64: base64, mimeType: mimeType, ext: ext })
        });
        var data = await res.json();
        if (res.ok && data.logo_url) {
          var img = document.getElementById('logo-preview-img');
          var ph  = document.getElementById('logo-placeholder');
          if (img) { img.src = data.logo_url; img.style.display = 'block'; }
          if (ph)  ph.style.display = 'none';
          showToast('Logo uploaded! ✓');
        } else {
          alert('Upload failed: ' + (data.error || 'Unknown error'));
        }
        input.value = '';
      };
      reader.readAsDataURL(file);
    }

    async function removeLogo() {
      if (!confirm('Remove your logo?')) return;
      var res = await fetch('/api/upload-logo', {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + sessionToken }
      });
      if (res.ok) {
        var img = document.getElementById('logo-preview-img');
        var ph  = document.getElementById('logo-placeholder');
        if (img) { img.src = ''; img.style.display = 'none'; }
        if (ph)  ph.style.display = 'flex';
        showToast('Logo removed.');
      } else {
        alert('Could not remove logo. Please try again.');
      }
    }

    async function openPortal() {
      var res = await fetch('/api/customer-portal', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + sessionToken }
      });
      var data = await res.json();
      if (data.url) { window.location.href = data.url; }
      else { alert('Could not open billing portal. Please try again.'); }
    }

    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

    function showToast(msg) {
      var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    init();
  </script>
  <script src="/feedback-widget.js"></script>
</body>
</html>
