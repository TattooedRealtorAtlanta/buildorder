<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; New Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lang.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #090E1A;
      --bg2:   #111827;
      --bg3:   #1A2438;
      --amber: #F59E0B;
      --amber2:#FCD34D;
      --white: #F8FAFC;
      --muted: #94A3B8;
      --dim:   #475569;
      --border:rgba(255,255,255,0.07);
      --red:   #EF4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
    .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; color: var(--dim); cursor: pointer; font-family: inherit; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .btn-back:hover { color: var(--white); border-color: var(--amber); }

    .main { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }

    .form-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .form-section-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.25rem; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    input, select, textarea {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.88rem;
      color: var(--white);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--amber); }
    select option { background: var(--bg2); }
    textarea { resize: vertical; min-height: 90px; }

    /* Line items */
    .line-items-header {
      display: grid;
      grid-template-columns: 1fr 70px 80px 110px 36px;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
      padding: 0 0.25rem;
    }
    .line-item-row {
      display: grid;
      grid-template-columns: 1fr 70px 80px 110px 36px;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
    }
    .btn-remove {
      background: none;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      color: var(--red);
      cursor: pointer;
      font-size: 0.9rem;
      height: 36px;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-remove:hover { background: rgba(239,68,68,0.1); }
    .btn-add-line {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      margin-top: 0.5rem;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-add-line:hover { color: var(--amber); border-color: var(--amber); }

    /* Totals preview */
    .totals-preview { background: var(--bg3); border-radius: 8px; padding: 1rem 1.25rem; margin-top: 1rem; }
    .totals-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .totals-row.total-line { font-weight: 800; font-size: 0.95rem; color: var(--amber); border-top: 1px solid var(--border); padding-top: 0.6rem; margin-top: 0.4rem; }
    .totals-row.balance-line { font-weight: 900; font-size: 1rem; color: #34D399; border-top: 1px solid var(--border); padding-top: 0.6rem; margin-top: 0.2rem; }
    .totals-label { color: var(--muted); }

    .btn-submit {
      background: var(--amber);
      color: #090E1A;
      border: none;
      border-radius: 10px;
      padding: 0.9rem 2rem;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      margin-top: 1.5rem;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--amber2); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--red); margin-top: 1rem; display: none; }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .line-items-header, .line-item-row { grid-template-columns: 1fr 60px 70px 36px; }
      .line-item-row .unit-col { display: none; }
      .line-items-header .unit-head { display: none; }
    }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .lang-toggle { display: flex; align-items: center; gap: 0.25rem; }
    .lang-btn { background: none; border: none; color: var(--dim); font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: inherit; padding: 0.2rem 0.4rem; border-radius: 4px; transition: color 0.15s; }
    .lang-btn.active { color: var(--amber); }
    .lang-btn:hover { color: var(--white); }
    .lang-sep { color: var(--dim); font-size: 0.75rem; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <div class="nav-right"><div class="lang-toggle"><button class="lang-btn" id="lang-btn-en" onclick="setLang('en')">EN</button><span class="lang-sep">|</span><button class="lang-btn" id="lang-btn-es" onclick="setLang('es')">ES</button></div><a href="/dashboard.html" class="btn-back" data-i18n="nav.back">&larr; Dashboard</a></div>
  </nav>

  <main class="main">
    <div class="page-title" data-i18n="inv.new.title">New Invoice</div>
    <div class="page-sub" data-i18n="inv.new.sub">Generate a professional invoice for completed work or a billing milestone.</div>

    <!-- Client Info -->
    <div class="form-section">
      <div class="form-section-title" data-i18n="inv.sec.client">Client Information</div>
      <div class="form-grid">
        <div class="form-group full">
          <label data-i18n="inv.lbl.name">Client Name *</label>
          <input type="text" id="homeowner_name" placeholder="Jane Smith">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.phone">Phone</label>
          <input type="tel" id="homeowner_phone" placeholder="(555) 555-5555">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.email">Email</label>
          <input type="email" id="homeowner_email" placeholder="jane@email.com">
        </div>
      </div>
    </div>

    <!-- Job Location -->
    <div class="form-section">
      <div class="form-section-title" data-i18n="inv.sec.address">Service Address</div>
      <div class="form-grid">
        <div class="form-group full">
          <label data-i18n="inv.lbl.address">Street Address</label>
          <input type="text" id="job_address" placeholder="123 Main St">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.city">City</label>
          <input type="text" id="job_city" placeholder="Atlanta">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.state">State</label>
          <input type="text" id="job_state" placeholder="GA" maxlength="2">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.zip">ZIP</label>
          <input type="text" id="job_zip" placeholder="30301">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.work_type">Work Type</label>
          <input type="text" id="work_type" placeholder="Kitchen Remodel">
        </div>
      </div>
    </div>

    <!-- Line Items -->
    <div class="form-section">
      <div class="form-section-title" data-i18n="inv.sec.items">Line Items</div>
      <div class="line-items-header">
        <div data-i18n="inv.col.desc">Description</div>
        <div data-i18n="inv.col.qty">Qty</div>
        <div class="unit-head" data-i18n="inv.col.unit">Unit</div>
        <div data-i18n="inv.col.price">Unit Price</div>
        <div></div>
      </div>
      <div id="line-items-container"></div>
      <button class="btn-add-line" data-i18n="inv.btn.add" onclick="addLineItem('','1','','')">+ Add Line Item</button>

      <div class="totals-preview" id="totals-preview">
        <div class="totals-row"><span class="totals-label" data-i18n="inv.tot.subtotal">Subtotal</span><span id="prev-subtotal">$0.00</span></div>
        <div class="totals-row"><span class="totals-label"><span data-i18n="inv.tot.tax">Tax</span> (<span id="prev-tax-rate">0</span>%)</span><span id="prev-tax">$0.00</span></div>
        <div class="totals-row total-line"><span data-i18n="inv.tot.total">Invoice Total</span><span id="prev-total">$0.00</span></div>
        <div class="totals-row" id="deposit-preview-row" style="display:none;"><span class="totals-label" data-i18n="inv.tot.payments">Payments Received</span><span id="prev-deposit" style="color:#34D399;">-$0.00</span></div>
        <div class="totals-row balance-line"><span data-i18n="inv.tot.balance">Balance Due</span><span id="prev-balance">$0.00</span></div>
      </div>
    </div>

    <!-- Terms -->
    <div class="form-section">
      <div class="form-section-title" data-i18n="inv.sec.terms">Invoice Terms</div>
      <div class="form-grid">
        <div class="form-group">
          <label data-i18n="inv.lbl.tax">Tax Rate (%)</label>
          <input type="number" id="tax_rate" placeholder="0" min="0" max="20" step="0.1" value="0" oninput="recalc()">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.due_days">Payment Due (days)</label>
          <input type="number" id="due_days" placeholder="30" value="30" min="1">
        </div>
        <div class="form-group">
          <label data-i18n="inv.lbl.deposit">Payments Already Received ($)</label>
          <input type="number" id="deposit_paid" placeholder="0.00" min="0" step="0.01" value="0" oninput="recalc()">
        </div>
        <div class="form-group full">
          <label data-i18n="inv.lbl.notes">Notes (optional)</label>
          <textarea id="notes" placeholder="Any additional notes for the client..."></textarea>
        </div>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button class="btn-submit" id="submit-btn" data-i18n="inv.btn.submit" onclick="createInvoice()">&#9733; Generate Invoice</button>
  </main>

  <script>
    var SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'bo-auth' } });

    db.auth.getSession().then(function(res) {
      if (!res.data.session) { window.location.href = '/login.html'; return; }
      addLineItem('', '1', '', '');
    });

    var lineCount = 0;

    function addLineItem(desc, qty, unit, price) {
      lineCount++;
      var id = 'li-' + lineCount;
      var row = document.createElement('div');
      row.className = 'line-item-row';
      row.id = id;
      row.innerHTML =
        '<input type="text" placeholder="Description of work" value="' + (desc || '') + '" class="li-desc">' +
        '<input type="number" placeholder="1" value="' + (qty || '1') + '" min="0" step="any" class="li-qty" oninput="recalc()">' +
        '<input type="text" placeholder="unit" value="' + (unit || '') + '" class="li-unit unit-col">' +
        '<input type="number" placeholder="0.00" value="' + (price || '') + '" min="0" step="0.01" class="li-price" oninput="recalc()">' +
        '<button class="btn-remove" onclick="removeLineItem(\'' + id + '\')" title="Remove">&times;</button>';
      document.getElementById('line-items-container').appendChild(row);
      recalc();
    }

    function removeLineItem(id) {
      var el = document.getElementById(id);
      if (el) el.remove();
      recalc();
    }

    function getLineItems() {
      var rows = document.getElementById('line-items-container').querySelectorAll('.line-item-row');
      var items = [];
      for (var i = 0; i < rows.length; i++) {
        var desc = rows[i].querySelector('.li-desc').value.trim();
        var qty  = rows[i].querySelector('.li-qty').value;
        var unit = rows[i].querySelector('.li-unit').value.trim();
        var uprice = rows[i].querySelector('.li-price').value;
        if (desc) {
          items.push({ description: desc, quantity: parseFloat(qty) || 1, unit: unit || 'unit', unit_price: parseFloat(uprice) || 0 });
        }
      }
      return items;
    }

    function recalc() {
      var items = getLineItems();
      var subtotal = 0;
      for (var i = 0; i < items.length; i++) {
        subtotal += (items[i].quantity || 1) * (items[i].unit_price || 0);
      }
      var taxRate = parseFloat(document.getElementById('tax_rate').value) || 0;
      var taxAmt  = subtotal * (taxRate / 100);
      var total   = subtotal + taxAmt;
      var deposit = parseFloat(document.getElementById('deposit_paid').value) || 0;
      var balance = total - deposit;

      document.getElementById('prev-subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('prev-tax-rate').textContent = taxRate;
      document.getElementById('prev-tax').textContent = '$' + taxAmt.toFixed(2);
      document.getElementById('prev-total').textContent = '$' + total.toFixed(2);
      document.getElementById('prev-balance').textContent = '$' + balance.toFixed(2);

      var depositRow = document.getElementById('deposit-preview-row');
      if (deposit > 0) {
        document.getElementById('prev-deposit').textContent = '-$' + deposit.toFixed(2);
        depositRow.style.display = 'flex';
      } else {
        depositRow.style.display = 'none';
      }
    }

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function createInvoice() {
      var name = document.getElementById('homeowner_name').value.trim();
      if (!name) { showError(T('inv.err.name')); return; }

      var items = getLineItems();
      var subtotal = 0;
      for (var i = 0; i < items.length; i++) {
        subtotal += (items[i].quantity || 1) * (items[i].unit_price || 0);
      }
      var taxRate   = parseFloat(document.getElementById('tax_rate').value) || 0;
      var taxAmt    = subtotal * (taxRate / 100);
      var total     = subtotal + taxAmt;
      var deposit   = parseFloat(document.getElementById('deposit_paid').value) || 0;
      var balance   = total - deposit;

      var invoiceData = {
        homeowner_name:  name,
        homeowner_phone: document.getElementById('homeowner_phone').value.trim() || null,
        homeowner_email: document.getElementById('homeowner_email').value.trim() || null,
        job_address:     document.getElementById('job_address').value.trim() || null,
        job_city:        document.getElementById('job_city').value.trim() || null,
        job_state:       document.getElementById('job_state').value.trim().toUpperCase() || null,
        job_zip:         document.getElementById('job_zip').value.trim() || null,
        work_type:       document.getElementById('work_type').value.trim() || null,
        line_items:      items.length > 0 ? items : null,
        subtotal:        subtotal,
        tax_rate:        taxRate,
        tax_amount:      taxAmt,
        total:           total,
        deposit_paid:    deposit,
        balance_due:     balance,
        due_days:        parseInt(document.getElementById('due_days').value) || 30,
        notes:           document.getElementById('notes').value.trim() || null,
        status:          'draft'
      };

      document.getElementById('error-msg').style.display = 'none';
      var btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = T('btn.saving');

      db.auth.getUser().then(function(userRes) {
        if (!userRes.data.user) { window.location.href = '/login.html'; return; }
        invoiceData.user_id = userRes.data.user.id;
        db.from('invoices').insert(invoiceData).select().single().then(function(res) {
          if (res.error) { showError('Error saving invoice: ' + res.error.message); btn.disabled = false; btn.textContent = T('inv.btn.submit'); return; }
          window.location.href = '/invoice.html?id=' + res.data.id + '&generate=true';
        });
      });
    }
  </script>
</body>
</html>
