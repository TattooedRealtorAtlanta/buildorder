<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; New Subcontractor Agreement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#090E1A; --bg2:#111827; --bg3:#1A2438; --amber:#F59E0B; --amber2:#FCD34D; --white:#F8FAFC; --muted:#94A3B8; --dim:#475569; --border:rgba(255,255,255,0.07); --red:#EF4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
    .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; color: var(--dim); cursor: pointer; font-family: inherit; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .btn-back:hover { color: var(--white); border-color: var(--amber); }
    .main { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .form-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .form-section-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    input, select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.88rem; color: var(--white); font-family: inherit; outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--amber); }
    select option { background: var(--bg2); }
    textarea { resize: vertical; min-height: 100px; }
    .btn-submit { background: var(--amber); color: #090E1A; border: none; border-radius: 10px; padding: 0.9rem 2rem; font-size: 0.95rem; font-weight: 800; cursor: pointer; font-family: inherit; width: 100%; margin-top: 1.5rem; transition: background 0.15s; }
    .btn-submit:hover { background: var(--amber2); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--red); margin-top: 1rem; display: none; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <a href="/dashboard.html" class="btn-back">&larr; Dashboard</a>
  </nav>
  <main class="main">
    <div class="page-title">New Subcontractor Agreement</div>
    <div class="page-sub">Create a binding agreement with any subcontractor working on your job.</div>

    <div class="form-section">
      <div class="form-section-title">Subcontractor Information</div>
      <div class="form-grid">
        <div class="form-group full"><label>Subcontractor Name *</label><input type="text" id="sub_name" placeholder="John Rivera"></div>
        <div class="form-group"><label>Company Name</label><input type="text" id="sub_company" placeholder="Rivera Plumbing LLC"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="sub_phone" placeholder="(555) 555-5555"></div>
        <div class="form-group"><label>Email</label><input type="email" id="sub_email" placeholder="john@email.com"></div>
        <div class="form-group"><label>License Number</label><input type="text" id="sub_license" placeholder="LIC-123456"></div>
        <div class="form-group"><label>Insurance / GL Policy #</label><input type="text" id="sub_insurance" placeholder="GL-789012"></div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Job Information</div>
      <div class="form-grid">
        <div class="form-group full"><label>Job Address</label><input type="text" id="job_address" placeholder="123 Main St"></div>
        <div class="form-group"><label>City</label><input type="text" id="job_city" placeholder="Atlanta"></div>
        <div class="form-group"><label>State</label><input type="text" id="job_state" placeholder="GA" maxlength="2"></div>
        <div class="form-group"><label>Work Type</label><input type="text" id="work_type" placeholder="Plumbing, Electrical, HVAC..."></div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Contract Details</div>
      <div class="form-grid">
        <div class="form-group full"><label>Scope of Work *</label><textarea id="scope_of_work" placeholder="Describe exactly what this subcontractor is responsible for..."></textarea></div>
        <div class="form-group"><label>Contract Amount ($) *</label><input type="number" id="contract_amount" placeholder="0.00" min="0" step="0.01"></div>
        <div class="form-group"><label>Payment Terms</label><input type="text" id="payment_terms" placeholder="50% upon start, 50% upon completion"></div>
        <div class="form-group"><label>Start Date</label><input type="date" id="start_date"></div>
        <div class="form-group"><label>Estimated Completion</label><input type="date" id="end_date"></div>
        <div class="form-group full"><label>Notes (optional)</label><textarea id="notes" placeholder="Any special requirements or conditions..."></textarea></div>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button class="btn-submit" id="submit-btn" onclick="createAgreement()">&#9733; Generate Subcontractor Agreement</button>
  </main>

  <script>
    var SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'bo-auth' } });
    db.auth.getSession().then(function(res) { if (!res.data.session) window.location.href = '/login.html'; });

    function showError(msg) { var el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }

    function createAgreement() {
      var subName = document.getElementById('sub_name').value.trim();
      var scope   = document.getElementById('scope_of_work').value.trim();
      var amount  = parseFloat(document.getElementById('contract_amount').value);
      if (!subName) { showError('Subcontractor name is required.'); return; }
      if (!scope)   { showError('Scope of work is required.'); return; }
      if (isNaN(amount)) { showError('Contract amount is required.'); return; }

      var data = {
        sub_name:        subName,
        sub_company:     document.getElementById('sub_company').value.trim() || null,
        sub_phone:       document.getElementById('sub_phone').value.trim() || null,
        sub_email:       document.getElementById('sub_email').value.trim() || null,
        sub_license:     document.getElementById('sub_license').value.trim() || null,
        sub_insurance:   document.getElementById('sub_insurance').value.trim() || null,
        job_address:     document.getElementById('job_address').value.trim() || null,
        job_city:        document.getElementById('job_city').value.trim() || null,
        job_state:       document.getElementById('job_state').value.trim().toUpperCase() || null,
        work_type:       document.getElementById('work_type').value.trim() || null,
        scope_of_work:   scope,
        contract_amount: amount,
        payment_terms:   document.getElementById('payment_terms').value.trim() || null,
        start_date:      document.getElementById('start_date').value || null,
        end_date:        document.getElementById('end_date').value || null,
        notes:           document.getElementById('notes').value.trim() || null,
        status:          'draft'
      };

      document.getElementById('error-msg').style.display = 'none';
      var btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Saving...';

      db.auth.getUser().then(function(userRes) {
        if (!userRes.data.user) { window.location.href = '/login.html'; return; }
        data.user_id = userRes.data.user.id;
        db.from('subcontractor_agreements').insert(data).select().single().then(function(res) {
          if (res.error) { showError('Error saving: ' + res.error.message); btn.disabled = false; btn.textContent = 'Generate Subcontractor Agreement'; return; }
          window.location.href = '/subcontractor.html?id=' + res.data.id + '&generate=true';
        });
      });
    }
  </script>
</body>
</html>
