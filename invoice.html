<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #090E1A;
      --bg2:   #111827;
      --bg3:   #1A2438;
      --amber: #F59E0B;
      --amber2:#FCD34D;
      --white: #F8FAFC;
      --muted: #94A3B8;
      --dim:   #475569;
      --border:rgba(255,255,255,0.07);
      --green: #34D399;
      --red:   #EF4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
    .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; color: var(--dim); cursor: pointer; font-family: inherit; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .btn-back:hover { color: var(--white); border-color: var(--amber); }

    .main { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }

    .inv-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; }
    .inv-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
    .inv-meta { font-size: 0.82rem; color: var(--muted); }
    .status-badge { display: inline-block; padding: 0.25rem 0.7rem; border-radius: 100px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-draft { background: rgba(148,163,184,0.12); color: var(--muted); }
    .status-sent  { background: rgba(245,158,11,0.12); color: var(--amber); }
    .status-paid  { background: rgba(52,211,153,0.12); color: var(--green); }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    .info-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .info-card-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.75rem; }
    .info-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .info-label { color: var(--muted); }
    .info-value { font-weight: 600; text-align: right; max-width: 60%; }
    .balance-highlight { font-size: 1.3rem; font-weight: 900; color: var(--green); }

    .invoice-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .invoice-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 0.75rem; }
    .invoice-title { font-size: 0.95rem; font-weight: 700; }
    .invoice-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn-action { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.78rem; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; transition: color 0.2s, border-color 0.2s; }
    .btn-action:hover { color: var(--white); border-color: var(--amber); }
    .btn-paid { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.78rem; font-weight: 700; color: var(--green); cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-paid:hover { background: rgba(52,211,153,0.2); }
    .btn-generate { background: var(--amber); color: #090E1A; border: none; border-radius: 8px; padding: 0.45rem 1.2rem; font-size: 0.82rem; font-weight: 800; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-generate:hover { background: var(--amber2); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    .generating { padding: 4rem 2rem; text-align: center; color: var(--muted); }
    .generating-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .generating h3 { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 0.5rem; }
    .generating p { font-size: 0.85rem; }

    .invoice-body { padding: 2rem; }
    .invoice-text { font-family: 'Courier New', Courier, monospace; font-size: 0.8rem; line-height: 1.75; color: #CBD5E1; white-space: pre-wrap; word-break: break-word; }

    .no-invoice { padding: 3rem 2rem; text-align: center; color: var(--muted); }
    .no-invoice h3 { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 0.5rem; }
    .no-invoice p { font-size: 0.85rem; margin-bottom: 1.5rem; }

    .error-msg { padding: 1rem 1.5rem; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; color: var(--red); font-size: 0.85rem; margin: 1rem 1.5rem; }

    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1.25rem; font-size: 0.85rem; font-weight: 600; color: var(--green); opacity: 0; transform: translateY(10px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) {
      .info-grid { grid-template-columns: 1fr; }
      .inv-header { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <a href="/dashboard.html" class="btn-back">&larr; Dashboard</a>
  </nav>

  <main class="main">
    <div id="page-content"></div>
  </main>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    var SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'bo-auth' } });

    var params = new URLSearchParams(window.location.search);
    var invoiceId = params.get('id');
    var autoGenerate = params.get('generate') === 'true';
    var currentInvoice = null;

    db.auth.getSession().then(function(res) {
      if (!res.data.session) { window.location.href = '/login.html'; return; }
      if (!invoiceId) { window.location.href = '/dashboard.html'; return; }
      loadInvoice();
    });

    function loadInvoice() {
      db.from('invoices').select('*').eq('id', invoiceId).single().then(function(res) {
        if (res.error || !res.data) {
          document.getElementById('page-content').innerHTML =
            '<div style="text-align:center;padding:4rem 2rem;color:var(--muted);">' +
            '<div style="font-size:2rem;margin-bottom:1rem;">&#9888;&#65039;</div>' +
            '<h3 style="color:var(--white);margin-bottom:0.5rem;">Invoice not found</h3>' +
            '<a href="/dashboard.html" style="display:inline-block;margin-top:1.5rem;color:var(--amber);text-decoration:none;font-weight:700;">&larr; Back to Dashboard</a>' +
            '</div>';
          return;
        }
        currentInvoice = res.data;
        renderPage();
        if (autoGenerate && !currentInvoice.content) {
          generateInvoice();
        }
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '&mdash;';
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function fmt(n) { return '$' + Number(n || 0).toFixed(2); }

    function renderPage() {
      var inv = currentInvoice;
      var statusClass = { draft: 'status-draft', sent: 'status-sent', paid: 'status-paid' }[inv.status] || 'status-draft';
      var location = [inv.job_city, inv.job_state].filter(Boolean).join(', ') || 'No location';
      var balanceLabel = inv.status === 'paid' ? 'PAID' : fmt(inv.balance_due);

      var paidBtn = inv.status !== 'paid'
        ? '<button class="btn-paid" onclick="markPaid()">&#10003; Mark as Paid</button>'
        : '';

      var actionsHtml = inv.content
        ? '<button class="btn-action" onclick="copyInvoice()">Copy</button>' +
          '<button class="btn-action" onclick="downloadInvoice()">Download .txt</button>' +
          paidBtn +
          '<button class="btn-generate" onclick="generateInvoice()">Regenerate</button>'
        : '<button class="btn-generate" onclick="generateInvoice()">&#10022; Generate Invoice</button>';

      document.getElementById('page-content').innerHTML =
        '<div class="inv-header">' +
          '<div>' +
            '<div class="inv-title">' + (inv.homeowner_name || 'No client') + '</div>' +
            '<div class="inv-meta">' + (inv.work_type || 'Invoice') + ' &middot; ' + location + ' &middot; Created ' + formatDate(inv.created_at) + '</div>' +
          '</div>' +
          '<span class="status-badge ' + statusClass + '">' + inv.status + '</span>' +
        '</div>' +

        '<div class="info-grid">' +
          '<div class="info-card">' +
            '<div class="info-card-title">Client</div>' +
            '<div class="info-row"><span class="info-label">Name</span><span class="info-value">' + (inv.homeowner_name || '&mdash;') + '</span></div>' +
            '<div class="info-row"><span class="info-label">Phone</span><span class="info-value">' + (inv.homeowner_phone || '&mdash;') + '</span></div>' +
            '<div class="info-row"><span class="info-label">Email</span><span class="info-value">' + (inv.homeowner_email || '&mdash;') + '</span></div>' +
            '<div class="info-row"><span class="info-label">Address</span><span class="info-value">' + (inv.job_address || '&mdash;') + '</span></div>' +
          '</div>' +
          '<div class="info-card">' +
            '<div class="info-card-title">Invoice Summary</div>' +
            '<div class="info-row"><span class="info-label">Subtotal</span><span class="info-value">' + fmt(inv.subtotal) + '</span></div>' +
            '<div class="info-row"><span class="info-label">Tax (' + (inv.tax_rate || 0) + '%)</span><span class="info-value">' + fmt(inv.tax_amount) + '</span></div>' +
            '<div class="info-row"><span class="info-label">Invoice Total</span><span class="info-value">' + fmt(inv.total) + '</span></div>' +
            (inv.deposit_paid > 0 ? '<div class="info-row"><span class="info-label">Paid</span><span class="info-value" style="color:var(--green);">-' + fmt(inv.deposit_paid) + '</span></div>' : '') +
            '<div class="info-row" style="margin-top:0.5rem;"><span class="info-label" style="font-weight:700;color:var(--white);">Balance Due</span><span class="balance-highlight">' + balanceLabel + '</span></div>' +
          '</div>' +
        '</div>' +

        '<div class="invoice-section">' +
          '<div class="invoice-header">' +
            '<div class="invoice-title">&#128203; Invoice</div>' +
            '<div class="invoice-actions" id="invoice-actions">' + actionsHtml + '</div>' +
          '</div>' +
          '<div id="invoice-body">' +
            (inv.content
              ? '<div class="invoice-body"><pre class="invoice-text">' + escapeHtml(inv.content) + '</pre></div>'
              : '<div class="no-invoice"><h3>No invoice generated yet</h3><p>Click Generate Invoice to create a professional invoice ready to send.</p></div>') +
          '</div>' +
        '</div>';
    }

    function generateInvoice() {
      document.getElementById('invoice-body').innerHTML =
        '<div class="generating">' +
          '<div class="generating-spinner"></div>' +
          '<h3>Generating your invoice&hellip;</h3>' +
          '<p>BuildOrder is creating a professional invoice for ' + (currentInvoice.homeowner_name || 'your client') + '.</p>' +
        '</div>';
      var actions = document.getElementById('invoice-actions');
      if (actions) actions.innerHTML = '<button class="btn-generate" disabled>Generating&hellip;</button>';

      fetch('/api/generate-invoice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ invoice_id: invoiceId })
      }).then(function(res) {
        return res.json().then(function(data) { return { ok: res.ok, data: data }; });
      }).then(function(result) {
        if (!result.ok || !result.data.success) {
          showError(result.data.error || 'Invoice generation failed. Please try again.');
          return;
        }
        currentInvoice.content = result.data.content;
        currentInvoice.status = 'sent';
        window.history.replaceState({}, '', '/invoice.html?id=' + invoiceId);
        renderPage();
      }).catch(function() {
        showError('Network error &mdash; please check your connection and try again.');
      });
    }

    function markPaid() {
      db.from('invoices').update({ status: 'paid' }).eq('id', invoiceId).then(function(res) {
        if (res.error) { alert('Error updating status.'); return; }
        currentInvoice.status = 'paid';
        renderPage();
        showToast('Marked as paid!');
      });
    }

    function showError(msg) {
      document.getElementById('invoice-body').innerHTML =
        '<div class="error-msg">&#9888; ' + msg + '</div>' +
        '<div class="no-invoice"><p>Something went wrong.</p>' +
        '<button class="btn-generate" onclick="generateInvoice()">Try Again</button></div>';
      var actions = document.getElementById('invoice-actions');
      if (actions) actions.innerHTML = '<button class="btn-generate" onclick="generateInvoice()">&#10022; Generate Invoice</button>';
    }

    function copyInvoice() {
      if (!currentInvoice || !currentInvoice.content) return;
      navigator.clipboard.writeText(currentInvoice.content).then(function() { showToast('Copied to clipboard!'); });
    }

    function downloadInvoice() {
      if (!currentInvoice || !currentInvoice.content) return;
      var filename = 'invoice-' + (currentInvoice.homeowner_name || 'client').replace(/\s+/g, '-').toLowerCase() + '.txt';
      var blob = new Blob([currentInvoice.content], { type: 'text/plain' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
