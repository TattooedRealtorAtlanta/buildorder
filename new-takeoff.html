<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; Material Takeoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lang.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#090E1A; --bg2:#111827; --bg3:#1A2438; --amber:#F59E0B; --amber2:#FCD34D; --white:#F8FAFC; --muted:#94A3B8; --dim:#475569; --border:rgba(255,255,255,0.07); --red:#EF4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
    .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.78rem; color: var(--dim); cursor: pointer; font-family: inherit; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .btn-back:hover { color: var(--white); border-color: var(--amber); }
    .main { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .form-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .form-section-title { font-size: 0.72rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group.third { grid-column: span 1; }
    label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    input, select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.88rem; color: var(--white); font-family: inherit; outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--amber); }
    select option { background: var(--bg2); }
    textarea { resize: vertical; min-height: 100px; }
    .hint { font-size: 0.73rem; color: var(--dim); margin-top: 0.2rem; }
    .dim-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .btn-submit { background: var(--amber); color: #090E1A; border: none; border-radius: 10px; padding: 0.9rem 2rem; font-size: 0.95rem; font-weight: 800; cursor: pointer; font-family: inherit; width: 100%; margin-top: 1.5rem; transition: background 0.15s; }
    .btn-submit:hover { background: var(--amber2); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--red); margin-top: 1rem; display: none; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } .dim-grid { grid-template-columns: 1fr 1fr; } }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .lang-toggle { display: flex; align-items: center; gap: 0.25rem; }
    .lang-btn { background: none; border: none; color: var(--dim); font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: inherit; padding: 0.2rem 0.4rem; border-radius: 4px; transition: color 0.15s; }
    .lang-btn.active { color: var(--amber); }
    .lang-btn:hover { color: var(--white); }
    .lang-sep { color: var(--dim); font-size: 0.75rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <div class="nav-right"><div class="lang-toggle"><button class="lang-btn" id="lang-btn-en" onclick="setLang('en')">EN</button><span class="lang-sep">|</span><button class="lang-btn" id="lang-btn-es" onclick="setLang('es')">ES</button></div><a href="/dashboard.html" class="btn-back" data-i18n="nav.back">&larr; Dashboard</a></div>
  </nav>
  <main class="main">
    <div class="page-title" data-i18n="to.new.title">Material Takeoff Calculator</div>
    <div class="page-sub" data-i18n="to.new.sub">Enter your project dimensions and BuildOrder will generate a complete materials list.</div>

    <div class="form-section">
      <div class="form-section-title">Project Info</div>
      <div class="form-grid">
        <div class="form-group"><label>Project Name (optional)</label><input type="text" id="project_name" placeholder="Smith Kitchen Remodel"></div>
        <div class="form-group"><label data-i18n="to.lbl.address">Job Address (optional)</label><input type="text" id="job_address" placeholder="123 Main St, Atlanta GA"></div>
        <div class="form-group full">
          <label data-i18n="to.lbl.type">Project Type *</label>
          <select id="project_type">
            <option value="">Select project type...</option>
            <option value="Hardwood Flooring">Hardwood Flooring</option>
            <option value="Laminate Flooring">Laminate Flooring</option>
            <option value="Tile Flooring">Tile Flooring</option>
            <option value="Carpet">Carpet</option>
            <option value="Luxury Vinyl Plank (LVP)">Luxury Vinyl Plank (LVP)</option>
            <option value="Drywall / Sheetrock">Drywall / Sheetrock</option>
            <option value="Interior Painting">Interior Painting</option>
            <option value="Exterior Painting">Exterior Painting</option>
            <option value="Roof Shingles">Roof Shingles</option>
            <option value="Roof Decking">Roof Decking</option>
            <option value="Concrete / Slab">Concrete / Slab</option>
            <option value="Deck / Patio">Deck / Patio</option>
            <option value="Fencing">Fencing</option>
            <option value="Framing / Lumber">Framing / Lumber</option>
            <option value="Insulation">Insulation</option>
            <option value="Ceramic Wall Tile">Ceramic Wall Tile</option>
            <option value="Countertops">Countertops</option>
            <option value="Bathroom Remodel">Bathroom Remodel</option>
            <option value="Kitchen Remodel">Kitchen Remodel</option>
            <option value="Other">Other (describe below)</option>
          </select>
        </div>
        <div class="form-group full">
          <label data-i18n="to.lbl.description">Project Description *</label>
          <textarea id="description" placeholder="Describe the project in detail — materials preference (tile size, wood species, shingle type, etc.), any special conditions, existing conditions that need to be removed, etc."></textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title" data-i18n="to.sec.dims">Dimensions</div>
      <div class="form-grid">
        <div class="form-group">
          <label data-i18n="to.lbl.sqft">Total Square Footage</label>
          <input type="number" id="total_sqft" placeholder="e.g. 850" min="0" step="1">
          <div class="hint">OR enter length x width below</div>
        </div>
        <div class="form-group">
          <label data-i18n="to.lbl.linear">Linear Feet (for fencing, trim, etc.)</label>
          <input type="number" id="linear_ft" placeholder="e.g. 120" min="0" step="1">
        </div>
      </div>
      <div class="dim-grid" style="margin-top:1rem;">
        <div class="form-group">
          <label data-i18n="to.lbl.length">Length (ft)</label>
          <input type="number" id="dim_length" placeholder="0" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label data-i18n="to.lbl.width">Width (ft)</label>
          <input type="number" id="dim_width" placeholder="0" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label data-i18n="to.lbl.height">Height (ft)</label>
          <input type="number" id="dim_height" placeholder="0" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label data-i18n="to.lbl.rooms">Number of Rooms</label>
          <input type="number" id="dim_rooms" placeholder="1" min="1" step="1">
        </div>
        <div class="form-group">
          <label data-i18n="to.lbl.perimeter">Perimeter (ft)</label>
          <input type="number" id="dim_perimeter" placeholder="0" min="0" step="1">
        </div>
        <div class="form-group">
          <label data-i18n="to.lbl.waste">Waste Factor (%)</label>
          <input type="number" id="waste_factor" placeholder="10" min="0" max="30" step="1" value="10">
          <div class="hint">10% is standard. Use 15% for tile/diagonal cuts.</div>
        </div>
      </div>
      <div style="margin-top:1rem;">
        <div class="form-group">
          <label data-i18n="to.lbl.custom">Custom Dimension</label>
          <input type="text" id="dim_custom" placeholder="e.g. 3 windows 3x4ft each, subtract for openings, irregular shape...">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Notes</div>
      <div class="form-group">
        <label data-i18n="to.lbl.notes">Notes (optional)</label>
        <textarea id="notes" placeholder="Budget constraints, preferred brands, specific product specs, local supplier preferences..."></textarea>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button class="btn-submit" id="submit-btn" data-i18n="to.btn.submit" onclick="createTakeoff()">&#9733; Generate Material Takeoff</button>
  </main>

  <script>
    var SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'bo-auth' } });
    db.auth.getSession().then(function(res) { if (!res.data.session) window.location.href = '/login.html'; });

    function showError(msg) { var el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }

    function createTakeoff() {
      var projectType = document.getElementById('project_type').value;
      var description = document.getElementById('description').value.trim();
      if (!projectType) { showError(T('to.err.type')); return; }
      if (!description) { showError(T('to.err.desc')); return; }

      var dims = {};
      var sqft = parseFloat(document.getElementById('total_sqft').value);
      var linFt = parseFloat(document.getElementById('linear_ft').value);
      var len = parseFloat(document.getElementById('dim_length').value);
      var wid = parseFloat(document.getElementById('dim_width').value);
      var ht = parseFloat(document.getElementById('dim_height').value);
      var rooms = parseInt(document.getElementById('dim_rooms').value);
      var perim = parseFloat(document.getElementById('dim_perimeter').value);
      var custom = document.getElementById('dim_custom').value.trim();

      if (!isNaN(sqft) && sqft > 0) dims.total_sqft = sqft;
      if (!isNaN(linFt) && linFt > 0) dims.linear_ft = linFt;
      if (!isNaN(len) && len > 0) dims.length = len;
      if (!isNaN(wid) && wid > 0) dims.width = wid;
      if (!isNaN(ht) && ht > 0) dims.height = ht;
      if (!isNaN(rooms) && rooms > 0) dims.rooms = rooms;
      if (!isNaN(perim) && perim > 0) dims.perimeter = perim;
      if (custom) dims.custom = custom;

      if (Object.keys(dims).length === 0) { showError(T('to.err.dims')); return; }

      var data = {
        project_name:  document.getElementById('project_name').value.trim() || null,
        job_address:   document.getElementById('job_address').value.trim() || null,
        project_type:  projectType,
        description:   description,
        dimensions:    dims,
        waste_factor:  parseInt(document.getElementById('waste_factor').value) || 10,
        notes:         document.getElementById('notes').value.trim() || null,
        status:        'draft'
      };

      document.getElementById('error-msg').style.display = 'none';
      var btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = T('btn.saving');

      db.auth.getUser().then(function(userRes) {
        if (!userRes.data.user) { window.location.href = '/login.html'; return; }
        data.user_id = userRes.data.user.id;
        db.from('material_takeoffs').insert(data).select().single().then(function(res) {
          if (res.error) { showError('Error saving: ' + res.error.message); btn.disabled = false; btn.textContent = T('to.btn.submit'); return; }
          window.location.href = '/takeoff.html?id=' + res.data.id + '&generate=true';
        });
      });
    }
  </script>
</body>
</html>
