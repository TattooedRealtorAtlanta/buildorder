<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #090E1A;
      --bg2:   #111827;
      --bg3:   #1A2438;
      --amber: #F59E0B;
      --amber2:#FCD34D;
      --white: #F8FAFC;
      --muted: #94A3B8;
      --dim:   #475569;
      --border:rgba(255,255,255,0.07);
      --green: #34D399;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

    /* Nav */
    .nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-name { font-size: 0.82rem; color: var(--muted); }
    .btn-signout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.9rem;
      font-size: 0.78rem;
      color: var(--dim);
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-signout:hover { color: var(--white); border-color: var(--amber); }

    /* Main */
    .main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .page-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
    .btn-new {
      background: var(--amber);
      color: #090E1A;
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1.4rem;
      font-size: 0.875rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s;
    }
    .btn-new:hover { background: var(--amber2); }

    /* Stats row */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; }

    /* Jobs list */
    .jobs-header {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0 1rem 0.75rem;
      display: grid;
      grid-template-columns: 1fr 180px 120px 100px;
      gap: 1rem;
    }
    .job-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 180px 120px 100px;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .job-card:hover { border-color: rgba(245,158,11,0.3); }
    .job-title { font-weight: 700; font-size: 0.92rem; margin-bottom: 0.2rem; }
    .job-sub { font-size: 0.78rem; color: var(--muted); }
    .job-price { font-weight: 700; font-size: 0.9rem; }
    .job-date { font-size: 0.8rem; color: var(--muted); }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.7rem;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-active { background: rgba(52,211,153,0.12); color: var(--green); }
    .status-draft { background: rgba(148,163,184,0.12); color: var(--muted); }
    .status-complete { background: rgba(245,158,11,0.12); color: var(--amber); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty h3 { font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 0.5rem; }
    .empty p { font-size: 0.875rem; margin-bottom: 1.5rem; }

    @media (max-width: 640px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .jobs-header { display: none; }
      .job-card { grid-template-columns: 1fr auto; }
      .job-price, .job-date { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/dashboard.html" class="logo">Build<em>Order</em></a>
    <div class="nav-right">
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div class="page-title">My Jobs</div>
      <a href="/new-job.html" class="btn-new">+ New Job</a>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total Jobs</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Active</div>
        <div class="stat-value" id="stat-active">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Documents Generated</div>
        <div class="stat-value" id="stat-docs">—</div>
      </div>
    </div>

    <div id="jobs-container">
      <div class="jobs-header">
        <div>Job</div>
        <div>Homeowner</div>
        <div>Value</div>
        <div>Status</div>
      </div>
      <div id="jobs-list"></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://pxqwtesczfhfjwdhxiyl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4cXd0ZXNjemZoZmp3ZGh4aXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDI3MDcsImV4cCI6MjA5NTIxODcwN30.rNmcfsteMK_IdyWkGLrNA5ZOlRVHQYahDrnIWmPGCLM';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }

      // Load profile
      const { data: profile } = await supabase.from('contractor_profiles').select('*').single();
      if (!profile || !profile.onboarding_complete) { window.location.href = '/onboarding.html'; return; }

      const name = profile.business_name || profile.contractor_name;
      document.getElementById('nav-name').textContent = name;

      // Load jobs
      const { data: jobs } = await supabase.from('jobs').select('*').order('created_at', { ascending: false });
      const { count: docCount } = await supabase.from('documents').select('*', { count: 'exact', head: true });

      // Stats
      document.getElementById('stat-total').textContent = jobs?.length || 0;
      document.getElementById('stat-active').textContent = jobs?.filter(j => j.status === 'active').length || 0;
      document.getElementById('stat-docs').textContent = docCount || 0;

      // Jobs list
      const list = document.getElementById('jobs-list');
      if (!jobs || jobs.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📋</div>
            <h3>No jobs yet</h3>
            <p>Create your first job to generate a state-compliant contract.</p>
            <a href="/new-job.html" class="btn-new">+ Create First Job</a>
          </div>`;
        document.querySelector('.jobs-header').style.display = 'none';
        return;
      }

      list.innerHTML = jobs.map(job => {
        const statusClass = { active: 'status-active', draft: 'status-draft', complete: 'status-complete' }[job.status] || 'status-draft';
        const price = job.contract_price ? '$' + Number(job.contract_price).toLocaleString() : '—';
        const date = job.created_at ? new Date(job.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
        const desc = job.project_description ? job.project_description.substring(0, 50) + (job.project_description.length > 50 ? '…' : '') : 'No description';
        return `
          <a href="/job.html?id=${job.id}" class="job-card">
            <div>
              <div class="job-title">${job.job_address || 'No address'}, ${job.job_city || ''} ${job.job_state || ''}</div>
              <div class="job-sub">${desc}</div>
            </div>
            <div>
              <div class="job-title" style="font-size:0.85rem;">${job.homeowner_name || '—'}</div>
              <div class="job-date">${job.work_type || ''}</div>
            </div>
            <div class="job-price">${price}</div>
            <div><span class="status-badge ${statusClass}">${job.status}</span></div>
          </a>`;
      }).join('');
    }

    async function signOut() {
      await supabase.auth.signOut();
      window.location.href = '/login.html';
    }

    init();
  </script>
</body>
</html>
