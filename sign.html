<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildOrder.ai &mdash; Review & Sign Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #090E1A;
      --bg2:   #111827;
      --bg3:   #1A2438;
      --amber: #F59E0B;
      --amber2:#FCD34D;
      --white: #F8FAFC;
      --muted: #94A3B8;
      --dim:   #475569;
      --border:rgba(255,255,255,0.07);
      --green: #34D399;
      --red:   #EF4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

    /* ── Nav ── */
    .nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em; text-decoration: none; color: var(--white); }
    .logo em { font-style: normal; color: var(--amber); }
    .nav-badge { font-size: 0.72rem; color: var(--muted); background: var(--bg3); border: 1px solid var(--border); border-radius: 100px; padding: 0.2rem 0.65rem; }

    /* ── Layout ── */
    .main { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* ── States ── */
    .state-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      margin: 2rem 0;
    }
    .state-icon { font-size: 3rem; margin-bottom: 1rem; }
    .state-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; }
    .state-sub { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }
    .state-box.success { border-color: var(--green); }
    .state-box.success .state-title { color: var(--green); }
    .state-box.expired { border-color: var(--red); }
    .state-box.expired .state-title { color: var(--red); }

    /* ── Doc header ── */
    .doc-meta-bar {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .doc-meta-type { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--amber); }
    .doc-meta-date { font-size: 0.78rem; color: var(--muted); }
    .doc-meta-expires { font-size: 0.72rem; color: var(--dim); }

    /* ── Document text ── */
    .doc-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .doc-card-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .doc-text {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--white);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 450px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    .doc-text::-webkit-scrollbar { width: 4px; }
    .doc-text::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }

    /* ── Already signed ── */
    .already-signed {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    /* ── Signature form ── */
    .sig-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
    }
    .sig-section-title { font-size: 1rem; font-weight: 800; margin-bottom: 0.35rem; }
    .sig-section-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }

    .form-field { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; }
    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.88rem;
      color: var(--white);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--amber); }

    .sig-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.5rem; display: block; }
    .sig-canvas-wrap {
      background: #fff;
      border-radius: 8px;
      border: 2px solid var(--border);
      overflow: hidden;
      margin-bottom: 0.5rem;
      width: 100%;
    }
    .sig-canvas-wrap canvas { display: block; width: 100%; height: 120px; touch-action: none; }
    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      color: var(--dim);
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 1.5rem;
    }
    .btn-clear:hover { color: var(--white); }

    .btn-submit {
      width: 100%;
      background: var(--amber);
      color: #090E1A;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .consent-note {
      font-size: 0.72rem;
      color: var(--dim);
      text-align: center;
      margin-top: 0.75rem;
      line-height: 1.5;
    }

    .powered-by {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: var(--dim);
    }
    .powered-by a { color: var(--amber); text-decoration: none; }
    .powered-by a:hover { text-decoration: underline; }

    /* ── Payment ── */
    .pay-section {
      background: var(--bg2);
      border: 1px solid rgba(245,158,11,0.35);
      border-radius: 12px;
      padding: 1.75rem;
      margin-top: 1.25rem;
      text-align: center;
    }
    .pay-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .pay-title { font-size: 1rem; font-weight: 800; margin-bottom: 0.35rem; }
    .pay-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.6; }
    .btn-pay {
      width: 100%;
      background: var(--amber);
      color: #090E1A;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-pay:hover { opacity: 0.9; }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
    .paid-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 480px) {
      .main { padding: 1.5rem 1rem 3rem; }
      .doc-meta-bar { flex-direction: column; align-items: flex-start; gap: 0.4rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="logo" href="https://buildorder.ai"><em>Build</em>Order</a>
    <span class="nav-badge">Secure Document Portal</span>
  </nav>

  <main class="main" id="main">
    <!-- content injected by JS -->
    <div class="state-box" id="loading-state">
      <div class="state-icon">&#8987;</div>
      <div class="state-title">Loading document…</div>
      <div class="state-sub">Please wait while we retrieve your document.</div>
    </div>
  </main>

  <script>
    var token = new URLSearchParams(window.location.search).get('token');
    var paid  = new URLSearchParams(window.location.search).get('paid') === '1';
    var sigPad = null;
    var docData = null;

    function fmtAmount(n) {
      return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function buildPaySection(amount) {
      var amtStr = fmtAmount(amount);
      return '<div class="pay-section">' +
        '<div class="pay-icon">&#128179;</div>' +
        '<div class="pay-title">Pay Your Invoice</div>' +
        '<div class="pay-sub">Pay securely by card. ' + amtStr + ' due. You\'ll be redirected to a secure Stripe checkout page.</div>' +
        '<button class="btn-pay" id="pay-btn" onclick="payInvoice()">Pay ' + amtStr + ' by Card</button>' +
      '</div>';
    }

    async function payInvoice() {
      var btn = document.getElementById('pay-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Redirecting to secure checkout…'; }
      try {
        var res = await fetch('/api/payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ share_token: token })
        });
        var d = await res.json();
        if (d.checkout_url) {
          window.location.href = d.checkout_url;
        } else {
          if (btn) { btn.disabled = false; btn.textContent = 'Pay by Card'; }
          alert(d.error || 'Could not start payment. Please try again.');
        }
      } catch(e) {
        if (btn) { btn.disabled = false; btn.textContent = 'Pay by Card'; }
        alert('Network error. Please check your connection and try again.');
      }
    }

    var TYPE_LABELS = {
      'contract':      'Home Improvement Contract',
      'estimate':      'Estimate',
      'invoice':       'Invoice',
      'proposal':      'Proposal & Contract',
      'change-order':  'Change Order',
      'subcontractor': 'Subcontractor Agreement',
      'lien-waiver':   'Lien Waiver',
      'takeoff':       'Material Takeoff',
      'document':      'Document'
    };

    function fmtDate(s) {
      if (!s) return '';
      return new Date(s).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showError(msg) {
      document.getElementById('main').innerHTML =
        '<div class="state-box expired">' +
          '<div class="state-icon">&#128683;</div>' +
          '<div class="state-title">' + msg + '</div>' +
          '<div class="state-sub">If you believe this is a mistake, please contact the contractor who sent you this link.</div>' +
        '</div>';
    }

    function showExpired() {
      document.getElementById('main').innerHTML =
        '<div class="state-box expired">' +
          '<div class="state-icon">&#8987;</div>' +
          '<div class="state-title">This link has expired</div>' +
          '<div class="state-sub">Document share links expire after 30 days. Please contact the contractor to request a new link.</div>' +
        '</div>';
    }

    function initSigPad() {
      var wrap = document.getElementById('sig-canvas-wrap');
      if (!wrap) return;
      var canvas = wrap.querySelector('canvas');
      if (!canvas) return;
      // Set canvas size to match display size
      var rect = wrap.getBoundingClientRect();
      canvas.width = rect.width || 480;
      canvas.height = 120;
      sigPad = new SignaturePad(canvas, { backgroundColor: 'rgb(255,255,255)', penColor: 'rgb(9,14,26)' });
    }

    function clearSig() { if (sigPad) sigPad.clear(); }

    async function submitSig() {
      var nameVal = (document.getElementById('sig-name').value || '').trim();
      var emailVal = (document.getElementById('sig-email').value || '').trim();
      if (!sigPad || sigPad.isEmpty()) {
        alert('Please draw your signature before submitting.');
        return;
      }
      var submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';

      var sigDataUrl = sigPad.toDataURL('image/png');

      try {
        var res = await fetch('/api/share', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'sign',
            token: token,
            client_name: nameVal || null,
            client_email: emailVal || null,
            client_sig: sigDataUrl
          })
        });
        var d = await res.json();
        if (res.status === 409) {
          // Already signed — refresh to show signed state
          window.location.reload();
          return;
        }
        if (!res.ok) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Signature';
          alert(d.error || 'Error submitting signature. Please try again.');
          return;
        }
        // Success
        var paySection = '';
        if (docData && docData.payment_available && docData.payment_amount && Number(docData.payment_amount) > 0 && !docData.paid_at) {
          paySection = buildPaySection(docData.payment_amount);
        }
        document.getElementById('main').innerHTML =
          '<div class="state-box success">' +
            '<div class="state-icon">&#10003;</div>' +
            '<div class="state-title">Document Signed</div>' +
            '<div class="state-sub">Your signature has been recorded. The contractor will be notified.' + (paySection ? ' Ready to pay? See below.' : ' You can close this window.') + '</div>' +
          '</div>' +
          paySection +
          '<div class="powered-by">Secure document portal powered by <a href="https://buildorder.ai/login.html?ref=' + (docData && docData.user_id ? docData.user_id : '') + '&tab=signup" target="_blank">BuildOrder.ai</a></div>';
      } catch(e) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Signature';
        alert('Network error. Please check your connection and try again.');
      }
    }

    function renderDoc(data) {
      docData = data;
      var typeLabel = TYPE_LABELS[data.document_type] || 'Document';
      var alreadySigned = !!data.signed_at;
      var isPaid = !!(data.paid_at || paid);
      var paymentAvailable = !!(data.payment_available && data.payment_amount && Number(data.payment_amount) > 0);

      // Contractor branding header
      var html = '';
      if (data.contractor_logo || data.contractor_name) {
        html += '<div style="display:flex;align-items:center;gap:1rem;padding:1rem 0 1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem;">';
        if (data.contractor_logo) {
          html += '<img src="' + data.contractor_logo + '" alt="Logo" style="height:48px;width:auto;max-width:140px;object-fit:contain;border-radius:6px;">';
        }
        if (data.contractor_name) {
          html += '<span style="font-size:1rem;font-weight:800;color:var(--white);letter-spacing:-0.01em;">' + data.contractor_name + '</span>';
        }
        html += '</div>';
      }

      html +=
        '<div class="doc-meta-bar">' +
          '<div>' +
            '<div class="doc-meta-type">' + typeLabel + '</div>' +
            '<div class="doc-meta-date">Created ' + fmtDate(data.created_at) + '</div>' +
          '</div>' +
          '<div class="doc-meta-expires">Expires ' + fmtDate(data.expires_at) + '</div>' +
        '</div>';

      // Paid badge
      if (isPaid) {
        html += '<div class="paid-badge">&#10003;&nbsp; ' +
          (paid && !data.paid_at ? 'Payment received — thank you!' : ('Paid on ' + fmtDate(data.paid_at))) +
        '</div>';
      }

      if (alreadySigned) {
        html += '<div class="already-signed">&#10003;&nbsp; This document was signed on ' + fmtDate(data.signed_at) + (data.client_name ? ' by ' + data.client_name : '') + '</div>';
      }

      // Proposal summary card — shown before the full document text
      if (data.document_type === 'proposal' && data.proposal_meta) {
        var pm = data.proposal_meta;
        var fmtTotal = pm.total ? '$' + Number(pm.total).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : null;
        var depositAmt = (pm.total && pm.deposit_pct) ? '$' + (Number(pm.total) * Number(pm.deposit_pct) / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : null;
        html +=
          '<div style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.25);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;">' +
            '<div style="font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--amber);margin-bottom:0.9rem;">Proposal Summary</div>' +
            '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;">' +
              (fmtTotal ? '<div><div style="font-size:0.68rem;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.25rem;">Total</div><div style="font-size:1.05rem;font-weight:800;color:var(--white);">' + fmtTotal + '</div></div>' : '') +
              (pm.deposit_pct != null ? '<div><div style="font-size:0.68rem;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.25rem;">Deposit</div><div style="font-size:1.05rem;font-weight:800;color:var(--amber);">' + pm.deposit_pct + '%' + (depositAmt ? '<span style="font-size:0.75rem;font-weight:600;color:var(--muted);display:block;">' + depositAmt + '</span>' : '') + '</div></div>' : '') +
              (pm.net_days != null ? '<div><div style="font-size:0.68rem;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.25rem;">Balance Due</div><div style="font-size:1.05rem;font-weight:800;color:var(--white);">Net ' + pm.net_days + '</div></div>' : '') +
            '</div>' +
          '</div>';
      }

      html +=
        '<div class="doc-card">' +
          '<div class="doc-card-title">&#128196; Document</div>' +
          '<pre class="doc-text">' + escapeHtml(data.document_content) + '</pre>' +
        '</div>';

      var sigTitle = data.document_type === 'proposal' ? 'Accept & Sign This Proposal' : 'Sign this Document';
      var sigSub = data.document_type === 'proposal'
        ? 'By signing below you accept the scope, pricing, and terms above. Your signature authorizes the contractor to begin work per the payment schedule.'
        : 'Review the document above, then draw your signature below to sign it electronically.';

      if (!alreadySigned) {
        html +=
          '<div class="sig-section">' +
            '<div class="sig-section-title">' + sigTitle + '</div>' +
            '<div class="sig-section-sub">' + sigSub + '</div>' +
            '<div class="form-field">' +
              '<label class="form-label" for="sig-name">Your Name (optional)</label>' +
              '<input class="form-input" type="text" id="sig-name" placeholder="Your full name">' +
            '</div>' +
            '<div class="form-field">' +
              '<label class="form-label" for="sig-email">Your Email (optional)</label>' +
              '<input class="form-input" type="email" id="sig-email" placeholder="your@email.com">' +
            '</div>' +
            '<label class="sig-label">Your Signature</label>' +
            '<div class="sig-canvas-wrap" id="sig-canvas-wrap"><canvas id="sig-canvas"></canvas></div>' +
            '<button class="btn-clear" onclick="clearSig()">&#8635; Clear</button>' +
            '<button class="btn-submit" id="submit-btn" onclick="submitSig()">Submit Signature</button>' +
            '<p class="consent-note">By submitting your signature you agree that this electronic signature is the legal equivalent of your handwritten signature on this document.</p>' +
          '</div>';
      } else if (paymentAvailable && !isPaid) {
        // Already signed — show pay section if payment not yet made
        html += buildPaySection(data.payment_amount);
      }

      html += '<div class="powered-by">Secure document portal powered by <a href="https://buildorder.ai/login.html?ref=' + (data.user_id || '') + '&tab=signup" target="_blank">BuildOrder.ai</a></div>';

      document.getElementById('main').innerHTML = html;

      if (!alreadySigned) {
        setTimeout(initSigPad, 60);
      }
    }

    // ── Init ────────────────────────────────────────────────────────────────
    if (!token) {
      showError('Invalid link — no token found');
    } else {
      fetch('/api/share?token=' + encodeURIComponent(token))
        .then(function(res) {
          if (res.status === 410) { showExpired(); return null; }
          if (res.status === 404) { showError('Document not found'); return null; }
          if (!res.ok) { showError('Error loading document'); return null; }
          return res.json();
        })
        .then(function(data) {
          if (data) renderDoc(data);
        })
        .catch(function() {
          showError('Network error — please check your connection');
        });
    }
  </script>

</body>
</html>
